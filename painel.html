    <div id="modal-root"></div>

    <script>
        // --- CONFIGURAÇÃO DO SUPABASE ---
        const SUPABASE_URL = 'https://izmdjkalwgupuehrbcxm.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml6bWRqa2Fsd2d1cHVlaHJiY3htIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzAyNDkwNTUsImV4cCI6MjA4NTgyNTA1NX0.w3FW5oORqiEjT0Xj3d3777KfE0xl2zm0ogezpfN3Gss'; 
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // --- CONSTANTES E CONFIGURAÇÕES PADRÃO ---
        const MONTHS = ['Janeiro', 'Fevereiro', 'Março', 'Abril', 'Maio', 'Junho', 'Julho', 'Agosto', 'Setembro', 'Outubro', 'Novembro', 'Dezembro'];
        const ICON_MAP = { Wallet: 'wallet', Home: 'home', HeartPulse: 'heart-pulse', Bus: 'bus', Car: 'car', Church: 'church', Smile: 'smile', TrendingUp: 'trending-up', CreditCard: 'credit-card', Receipt: 'receipt' };

        const DEFAULT_METADATA = {
            'Renda Familiar': 'income', 'Casa': 'expense', 'Saúde': 'expense', 'Automóvel': 'expense',
            'Transporte': 'expense', 'Cartão de Crédito': 'expense', 'Investimento': 'investment'
        };

        const CATEGORIES_CONFIG = {
            'Renda Familiar': { icon: 'Wallet', type: 'income', items: ['Salário Principal', 'Salário Secundário', 'Renda Extra', 'Outros'] },
            'Casa': { icon: 'Home', type: 'expense', items: ['Aluguel / Prestação', 'Condomínio', 'Luz', 'Água', 'Internet', 'Mercado', 'Gás'] },
            'Automóvel': { icon: 'Car', type: 'expense', items: ['Parcela do Carro', 'Combustível', 'Seguro', 'IPVA', 'Mecânico', 'Lavagem'] },
            'Saúde': { icon: 'HeartPulse', type: 'expense', items: ['Plano de Saúde', 'Farmácia', 'Consultas', 'Outros'] },
            'Transporte': { icon: 'Bus', type: 'expense', items: ['Transporte Público', 'Aplicativos (Uber/99)'] },
            'Lazer': { icon: 'Smile', type: 'expense', items: ['Alimentação fora', 'Assinaturas (Netflix, etc)', 'Passeios', 'Compras'] },
            'Cartão de Crédito': { icon: 'CreditCard', type: 'expense', items: ['Cartão Principal', 'Cartão Adicional'] },
            'Investimento': { icon: 'TrendingUp', type: 'investment', items: ['Reserva de Emergência', 'Renda Fixa', 'Renda Variável'] },
        };

        const COLORS_GERAL = ['#0ea5e9', '#ec4899', '#10b981', '#8b5cf6', '#f59e0b', '#6366f1', '#f43f5e', '#14b8a6'];
        const COLORS_INCOME = ['#10b981', '#3b82f6', '#f59e0b', '#8b5cf6', '#ec4899', '#14b8a6', '#f43f5e', '#6366f1'];
        const COLORS_CC = ['#8b5cf6', '#f59e0b', '#ec4899', '#10b981', '#3b82f6', '#f43f5e', '#14b8a6'];
        
        const EXTENDED_COLORS = ['#3b82f6', '#10b981', '#8b5cf6', '#f59e0b', '#ec4899', '#14b8a6', '#f43f5e', '#6366f1', '#0ea5e9', '#84cc16', '#a855f7', '#d946ef'];
        
        const FIXED_INVEST_COLORS = { 'Reserva': '#3b82f6', 'Renda Fixa': '#10b981', 'Renda Variável': '#8b5cf6', 'Criptomoedas': '#f59e0b' };
        
        const GOAL_COLORS = {
            blue: { text: 'text-blue-600', hex: '#3b82f6' }, pink: { text: 'text-pink-600', hex: '#ec4899' },
            emerald: { text: 'text-emerald-600', hex: '#10b981' }, purple: { text: 'text-purple-600', hex: '#a855f7' },
            amber: { text: 'text-amber-500', hex: '#f59e0b' }, orange: { text: 'text-orange-500', hex: '#f97316' },
            teal: { text: 'text-teal-500', hex: '#14b8a6' }
        };
        const DYNAMIC_COLORS = ['purple', 'amber', 'orange', 'teal'];
        const DEFAULT_FIXED_ITEMS = ['Condomínio', 'Luz', 'Água', 'Internet', 'Aluguel', 'Prestação', 'Plano de Saúde', 'Parcela do Carro', 'IPVA', 'Seguro', 'Assinaturas'];
        const isDefaultFixed = (itemName) => DEFAULT_FIXED_ITEMS.some(keyword => itemName.toLowerCase().includes(keyword.toLowerCase()));

        function generateEmptyYearData() {
            let data = {};
            MONTHS.forEach(m => {
                data[m] = { 
                    goals: { 
                        fixed: { label: 'Contas Fixas', value: 50, color: 'blue' }, 
                        variable: { label: 'Despesas Variáveis', value: 30, color: 'pink' }, 
                        investment: { label: 'Investimentos', value: 20, color: 'emerald' } 
                    }, 
                    itemMetadata: {}, 
                    categoriesMetadata: { ...DEFAULT_METADATA } 
                };
                Object.keys(CATEGORIES_CONFIG).forEach(cat => {
                    data[m][cat] = {}; data[m].itemMetadata[cat] = {};
                    CATEGORIES_CONFIG[cat].items.forEach(item => {
                        data[m][cat][item] = 0;
                        if (CATEGORIES_CONFIG[cat].type === 'investment') data[m].itemMetadata[cat][item] = item.toLowerCase().includes('reserva') ? 'reserva' : item.toLowerCase().includes('fixa') ? 'fixa' : 'variavel';
                        else data[m].itemMetadata[cat][item] = isDefaultFixed(item) ? 'fixed' : 'variable';
                    });
                });
            });
            return data;
        }

        function deepClone(obj) { return JSON.parse(JSON.stringify(obj)); }
        function safeId(str) { return str.toString().replace(/[^a-z0-9]/gi, '-').toLowerCase(); }

        // --- ESTADO GLOBAL DA APLICAÇÃO ---
        const currentYearString = new Date().getFullYear().toString();
        
        const AppState = {
            user: null, budgetData: { [currentYearString]: generateEmptyYearData() }, currentYear: currentYearString,
            currentMonthIdx: new Date().getMonth(), activeTab: 'dashboard', loading: true, saving: false, errorMsg: null,
            showSyncSuccess: false, syncSuccessTimer: null,
            confirmMonthChange: null, confirmDeleteItem: null, activeModal: null, charts: {}, 
            investFilterYear: currentYearString, investFilterType: 'all', investFilterAsset: 'all', investFilterMetric: 'todos',
            rendaFilterItem: 'all',
            get currentMonth() { return MONTHS[this.currentMonthIdx]; },
            get currentData() { return this.budgetData[this.currentYear][this.currentMonth]; }
        };

        // --- FUNÇÕES UTILITÁRIAS ---
        function formatCurrency(value) { return new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(value || 0); }
        function parseCurrencyString(val) { const raw = String(val).replace(/\D/g, ''); return raw ? Number(raw) / 100 : 0; }
        function formatCurrencyInput(val) { const num = Number(val); if (isNaN(num)) return '0,00'; return new Intl.NumberFormat('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 }).format(num); }
        function getCategoryIconAndColor(catName) { if (CATEGORIES_CONFIG[catName]) return { ...CATEGORIES_CONFIG[catName], color: 'text-slate-600', bg: 'bg-slate-100' }; return { icon: 'Receipt', color: 'text-slate-600', bg: 'bg-slate-100', type: 'expense' }; }
        function getCategoryTotal(year, month, category) { if (!AppState.budgetData[year] || !AppState.budgetData[year][month] || !AppState.budgetData[year][month][category]) return 0; return Object.values(AppState.budgetData[year][month][category]).reduce((acc, val) => acc + (Number(val) || 0), 0); }

        function getAccumulatedAssetDetails(upToYearStr, upToMonthIdx) {
            let assets = {}; 
            const allYears = Object.keys(AppState.budgetData).sort();
            
            for (const y of allYears) {
                if (Number(y) > Number(upToYearStr)) continue;
                const maxMonth = (y === upToYearStr) ? upToMonthIdx : 11;
                
                for (let i = 0; i <= maxMonth; i++) {
                    const m = MONTHS[i];
                    if (AppState.budgetData[y] && AppState.budgetData[y][m]) {
                        const monthData = AppState.budgetData[y][m];
                        const meta = monthData.categoriesMetadata || DEFAULT_METADATA;
                        Object.keys(monthData).forEach(cat => {
                            if (!['goals', 'itemMetadata', 'categoriesMetadata'].includes(cat) && (meta[cat] || CATEGORIES_CONFIG[cat]?.type) === 'investment') {
                                Object.entries(monthData[cat]).forEach(([name, val]) => {
                                    const numVal = Number(val) || 0; 
                                    const yieldVal = Number(monthData.itemMetadata?.[cat]?.[`${name}_yield`]) || 0; 
                                    const type = monthData.itemMetadata?.[cat]?.[name] || (name.toLowerCase().includes('reserva')?'reserva':name.toLowerCase().includes('fixa')?'fixa':'variavel');
                                    const inst = monthData.itemMetadata?.[cat]?.[`${name}_inst`] || '';
                                    
                                    if (!assets[name]) assets[name] = { invested: 0, yield: 0, type: type, cat: cat, inst: inst };
                                    assets[name].invested += numVal;
                                    assets[name].yield += yieldVal;
                                    
                                    if (monthData.itemMetadata?.[cat]?.[name]) assets[name].type = monthData.itemMetadata[cat][name];
                                    if (monthData.itemMetadata?.[cat]?.[`${name}_inst`] !== undefined) assets[name].inst = monthData.itemMetadata[cat][`${name}_inst`];
                                });
                            }
                        });
                    }
                }
            }
            return { assets };
        }

        function calculateMetrics() {
            const calcMonth = (y, m) => {
                let renda = 0, gastos = 0, fixos = 0, variaveis = 0, investimentosMes = 0, reservaMesAtual = 0;
                if(!AppState.budgetData[y] || !AppState.budgetData[y][m]) return { renda, gastos, saldo: 0, fixos, variaveis, investimentosMes, reservaMesAtual };

                Object.keys(AppState.budgetData[y][m]).forEach(cat => {
                    if (['goals', 'itemMetadata', 'categoriesMetadata'].includes(cat)) return;
                    const config = CATEGORIES_CONFIG[cat] || { type: 'expense' };
                    const catMetaType = AppState.budgetData[y][m].categoriesMetadata?.[cat] || config.type || 'expense';

                    if (catMetaType === 'income' || cat === 'Renda Familiar') {
                        renda += getCategoryTotal(y, m, cat);
                    } else if (catMetaType === 'investment' || cat === 'Investimento') {
                        Object.entries(AppState.budgetData[y][m][cat]).forEach(([item, val]) => {
                            const numVal = Number(val) || 0;
                            const type = AppState.budgetData[y][m].itemMetadata?.[cat]?.[item] || (item.toLowerCase().includes('reserva') ? 'reserva' : item.toLowerCase().includes('fixa') ? 'fixa' : 'variavel');
                            if(type === 'reserva') reservaMesAtual += numVal;
                            else investimentosMes += numVal;
                        });
                    } else {
                        Object.entries(AppState.budgetData[y][m][cat]).forEach(([item, val]) => {
                            const numVal = Number(val) || 0; gastos += numVal;
                            const type = AppState.budgetData[y][m].itemMetadata?.[cat]?.[item] || 'variable';
                            if (type === 'fixed') fixos += numVal; else variaveis += numVal;
                        });
                    }
                });
                return { renda, gastos, saldo: renda - (gastos + investimentosMes + reservaMesAtual), fixos, variaveis, investimentosMes, reservaMesAtual };
            };

            const current = calcMonth(AppState.currentYear, AppState.currentMonth);
            let acumulado = 0;
            const historyList = [];

            for (let i = 0; i < 12; i++) {
                const mData = calcMonth(AppState.currentYear, MONTHS[i]);
                acumulado += mData.saldo;
                historyList.push({ month: MONTHS[i], renda: mData.renda, gastos: mData.gastos, investido: mData.investimentosMes + mData.reservaMesAtual, saldo: mData.saldo });
            }

            const custoDeVida = current.fixos;
            const accDetails = getAccumulatedAssetDetails(AppState.currentYear, 11);
            let reservaTotalAcumulada = 0;
            Object.values(accDetails.assets).forEach(data => {
                if (data.type === 'reserva') reservaTotalAcumulada += (data.invested + data.yield);
            });

            return { totals: { ...current, acumulado }, metrics: { custoDeVida, metaReserva6m: custoDeVida * 6, metaReserva12m: custoDeVida * 12, reservaTotalAcumulada }, historyData: historyList };
        }

        // --- BANCO DE DADOS E SINCRONIZAÇÃO ---
        function updateSyncUI() {
            const syncEl = document.getElementById('sync-status');
            let statusHTML = '';
            if (AppState.errorMsg) statusHTML = `<span class="flex items-center gap-1 text-rose-500"><i data-lucide="alert-circle" class="w-4 h-4"></i> <span class="hidden sm:inline">${AppState.errorMsg}</span></span>`;
            else if (AppState.saving) statusHTML = `<span class="flex items-center gap-1 text-slate-500"><i data-lucide="loader-2" class="w-4 h-4 animate-spin"></i> <span class="hidden sm:inline">Salvando...</span></span>`;
            else if (AppState.showSyncSuccess) statusHTML = `<span class="flex items-center gap-1 text-emerald-600 transition-opacity duration-300"><i data-lucide="check-circle-2" class="w-4 h-4"></i> <span class="hidden sm:inline">Salvo</span></span>`;
            if (syncEl) syncEl.innerHTML = statusHTML; 
            lucide.createIcons();
        }

        function mergeServerData(serverData) {
            if (!serverData || typeof serverData !== 'object' || serverData.incomes || serverData.bills) return deepClone(AppState.budgetData);
            let parsedData = serverData; if (parsedData['Janeiro'] && !parsedData[currentYearString]) parsedData = { [currentYearString]: parsedData };
            let newData = deepClone(AppState.budgetData);
            
            Object.keys(parsedData).forEach(year => {
                if (!newData[year]) newData[year] = generateEmptyYearData();
                Object.keys(parsedData[year]).forEach(m => {
                    if (newData[year][m]) {
                        if (parsedData[year][m].goals) {
                            if (typeof parsedData[year][m].goals.fixed === 'number') newData[year][m].goals = { fixed: { label: 'Contas Fixas', value: parsedData[year][m].goals.fixed || 0, color: 'blue' }, variable: { label: 'Despesas Variáveis', value: parsedData[year][m].goals.variable || 0, color: 'pink' }, investment: { label: 'Investimentos', value: parsedData[year][m].goals.investment || 0, color: 'emerald' } };
                            else newData[year][m].goals = parsedData[year][m].goals;
                        }
                        Object.keys(newData[year][m]).forEach(k => { if (!['goals', 'itemMetadata', 'categoriesMetadata'].includes(k)) delete newData[year][m][k]; });
                        if (!newData[year][m].itemMetadata) newData[year][m].itemMetadata = {};
                        
                        newData[year][m].categoriesMetadata = parsedData[year][m].categoriesMetadata || { ...DEFAULT_METADATA };
                        Object.keys(newData[year][m].categoriesMetadata).forEach(cat => { if (['fixed', 'variable', 'tithe'].includes(newData[year][m].categoriesMetadata[cat])) newData[year][m].categoriesMetadata[cat] = 'expense'; });

                        Object.keys(parsedData[year][m]).forEach(cat => {
                            if (!['goals', 'itemMetadata', 'categoriesMetadata'].includes(cat)) {
                                newData[year][m][cat] = {}; if (!newData[year][m].itemMetadata[cat]) newData[year][m].itemMetadata[cat] = {};
                                Object.keys(parsedData[year][m][cat]).forEach(item => {
                                    newData[year][m][cat][item] = parsedData[year][m][cat][item];
                                    if (parsedData[year][m].itemMetadata?.[cat]?.[item]) newData[year][m].itemMetadata[cat][item] = parsedData[year][m].itemMetadata[cat][item];
                                    else { const catConfig = CATEGORIES_CONFIG[cat]; if (catConfig?.type === 'investment') newData[year][m].itemMetadata[cat][item] = item.toLowerCase().includes('reserva') ? 'reserva' : item.toLowerCase().includes('fixa') ? 'fixa' : 'variavel'; else newData[year][m].itemMetadata[cat][item] = isDefaultFixed(item) ? 'fixed' : 'variable'; }
                                    if (parsedData[year][m].itemMetadata?.[cat]?.[`${item}_inst`] !== undefined) newData[year][m].itemMetadata[cat][`${item}_inst`] = parsedData[year][m].itemMetadata[cat][`${item}_inst`];
                                    if (parsedData[year][m].itemMetadata?.[cat]?.[`${item}_yield`] !== undefined) newData[year][m].itemMetadata[cat][`${item}_yield`] = parsedData[year][m].itemMetadata[cat][`${item}_yield`];
                                });
                            }
                        });
                    }
                });
            });
            return newData;
        }

        async function saveToDatabase() {
            AppState.saving = true; AppState.errorMsg = null; AppState.showSyncSuccess = false; updateSyncUI();
            try {
                if (!AppState.user) return;
                const { error } = await supabaseClient.from('dados_financeiros').upsert({ id: AppState.user.id, payload: AppState.budgetData, updated_at: new Date() });
                if (error) throw error;
                
                AppState.showSyncSuccess = true;
                clearTimeout(AppState.syncSuccessTimer);
                AppState.syncSuccessTimer = setTimeout(() => {
                    AppState.showSyncSuccess = false;
                    updateSyncUI();
                }, 3000);
            } catch (error) { AppState.errorMsg = "Falha ao salvar."; } finally { AppState.saving = false; updateSyncUI(); }
        }

        async function loadDatabaseData() {
            try {
                if (!AppState.user) return;
                const { data, error } = await supabaseClient.from('dados_financeiros').select('payload').eq('id', AppState.user.id).single();
                if (data && data.payload) AppState.budgetData = mergeServerData(data.payload);
            } catch (error) {} finally { AppState.loading = false; renderApp(); }
        }

        // --- AÇÕES DO USUÁRIO & DEBOUNCE ---
        let typingTimer;

        window.AppActions = {
            sair: async () => { 
                await supabaseClient.auth.signOut(); 
                localStorage.removeItem("logado"); 
                sessionStorage.removeItem("logado");
                window.location.href = "login.html"; 
            },
            changeTab: (tabId) => { AppState.activeTab = tabId; renderApp(); },
            changeYear: (delta) => { 
                const newYearStr = (parseInt(AppState.currentYear) + delta).toString(); 
                if (!AppState.budgetData[newYearStr]) { 
                    let lastMonthData = null;
                    const years = Object.keys(AppState.budgetData).sort();
                    if (years.length > 0) {
                        const lastYear = years[years.length - 1];
                        lastMonthData = AppState.budgetData[lastYear]['Dezembro'] || AppState.budgetData[lastYear][MONTHS[11]];
                    }
                    
                    let newData = {};
                    MONTHS.forEach(m => {
                        newData[m] = lastMonthData ? deepClone(lastMonthData) : generateEmptyYearData()['Janeiro'];
                        Object.keys(newData[m]).forEach(cat => {
                            if (!['goals', 'itemMetadata', 'categoriesMetadata'].includes(cat)) {
                                Object.keys(newData[m][cat]).forEach(item => {
                                    newData[m][cat][item] = 0;
                                    if (newData[m].itemMetadata?.[cat]?.[`${item}_yield`] !== undefined) {
                                        newData[m].itemMetadata[cat][`${item}_yield`] = 0;
                                    }
                                });
                            }
                        });
                    });
                    AppState.budgetData[newYearStr] = newData; 
                    saveToDatabase(); 
                } 
                AppState.currentYear = newYearStr; 
                AppState.investFilterYear = newYearStr;
                renderApp(); 
            },
            prevMonth: () => { if (AppState.currentMonthIdx > 0) { AppState.currentMonthIdx--; renderApp(); } },
            nextMonthConfirm: () => { if (AppState.currentMonthIdx < 11) { AppState.confirmMonthChange = AppState.currentMonthIdx + 1; renderModal(); } },
            confirmMonthChange: () => { AppState.currentMonthIdx = AppState.confirmMonthChange; AppState.confirmMonthChange = null; renderApp(); },
            
            // Controle de Modais Unificado
            closeModal: () => { AppState.activeModal = null; AppState.confirmMonthChange = null; AppState.confirmDeleteItem = null; renderModal(); },
            
            openAddCategoryModal: (year, month) => { AppState.activeModal = { type: 'category', year, month, oldName: null }; renderModal(); },
            openEditCategoryModal: (year, month, oldName) => { AppState.activeModal = { type: 'category', year, month, oldName }; renderModal(); },
            
            openAddItemModal: (year, month, cat, itemType) => { AppState.activeModal = { type: 'addItem', year, month, cat, itemType }; renderModal(); },
            
            openAddGoalModal: (year, month) => { AppState.activeModal = { type: 'goal', year, month, id: null }; renderModal(); },
            openEditGoalModal: (year, month, id, oldName) => { AppState.activeModal = { type: 'goal', year, month, id, oldName }; renderModal(); },
            
            openAporteModal: (year, month) => { AppState.activeModal = { type: 'aporte', year, month }; renderModal(); },
            
            requestDeleteGeneric: (type, title, message, data) => { AppState.activeModal = { type: 'confirmDelete', title, message, actionData: { type, ...data } }; renderModal(); },
            
            // Especial para Investimentos com aviso de acúmulo (Mantido para preservar a lógica original segura)
            requestDeleteItem: (year, month, cat, name, accumulatedValue) => {
                if (accumulatedValue > 0) {
                    AppState.confirmDeleteItem = { year, month, cat, name, accumulatedValue };
                    renderModal();
                } else {
                    AppActions.deleteItem(year, month, cat, name);
                }
            },
            confirmDeleteInvest: () => {
                const { year, month, cat, name } = AppState.confirmDeleteItem;
                AppState.confirmDeleteItem = null;
                AppActions.deleteItem(year, month, cat, name);
            },
            
            // Executores dos Modais
            executeDelete: () => {
                const d = AppState.activeModal.actionData;
                if(d.type === 'category') {
                    delete AppState.budgetData[d.year][d.month][d.cat];
                    if(AppState.budgetData[d.year][d.month].itemMetadata[d.cat]) delete AppState.budgetData[d.year][d.month].itemMetadata[d.cat];
                    if(AppState.budgetData[d.year][d.month].categoriesMetadata[d.cat]) delete AppState.budgetData[d.year][d.month].categoriesMetadata[d.cat];
                } else if (d.type === 'item') {
                    AppActions.deleteItem(d.year, d.month, d.cat, d.name);
                } else if (d.type === 'goal') {
                    const startIdx = MONTHS.indexOf(d.month);
                    for (let i = startIdx; i < 12; i++) {
                        const m = MONTHS[i];
                        if (AppState.budgetData[d.year][m] && AppState.budgetData[d.year][m].goals) {
                            delete AppState.budgetData[d.year][m].goals[d.id];
                        }
                    }
                }
                saveToDatabase(); AppState.activeModal = null; renderApp();
            },

            saveNewItem: () => {
                const m = AppState.activeModal;
                let name = document.getElementById('modal-item-name').value.trim();
                const valStr = document.getElementById('modal-item-val').value;
                const numVal = parseCurrencyString(valStr);

                if(!name) return alert("Preencha o nome do registro.");

                let fn = name, c = 1;
                while (AppState.budgetData[m.year][m.month][m.cat] && AppState.budgetData[m.year][m.month][m.cat][fn] !== undefined) { fn = `${name} ${c}`; c++; }
                
                const isInvest = m.cat === 'Investimento' || AppState.budgetData[m.year][m.month].categoriesMetadata?.[m.cat] === 'investment';

                if (isInvest) {
                    const typeVal = document.getElementById('modal-item-type').value;
                    const instVal = document.getElementById('modal-item-inst').value.trim();
                    Object.keys(AppState.budgetData).forEach(y => {
                        Object.keys(AppState.budgetData[y]).forEach(mon => {
                            if (!AppState.budgetData[y][mon][m.cat]) AppState.budgetData[y][mon][m.cat] = {};
                            if (!AppState.budgetData[y][mon].itemMetadata[m.cat]) AppState.budgetData[y][mon].itemMetadata[m.cat] = {};
                            AppState.budgetData[y][mon][m.cat][fn] = 0;
                            AppState.budgetData[y][mon].itemMetadata[m.cat][fn] = typeVal;
                            if(instVal) AppState.budgetData[y][mon].itemMetadata[m.cat][`${fn}_inst`] = instVal;
                        });
                    });
                    AppState.budgetData[m.year][m.month][m.cat][fn] = numVal;
                } else {
                    if (!AppState.budgetData[m.year][m.month][m.cat]) { 
                        AppState.budgetData[m.year][m.month][m.cat] = {}; 
                        AppState.budgetData[m.year][m.month].categoriesMetadata[m.cat] = m.cat === 'Renda Familiar' ? 'income' : 'expense'; 
                    }
                    AppState.budgetData[m.year][m.month][m.cat][fn] = numVal;
                    if (!AppState.budgetData[m.year][m.month].itemMetadata[m.cat]) AppState.budgetData[m.year][m.month].itemMetadata[m.cat] = {};
                    
                    // Lê se é Fixo ou Variável no Modal (se não for Renda nem Investimento)
                    let selectedType = m.itemType;
                    if (m.cat !== 'Renda Familiar' && m.cat !== 'Investimento') {
                        const elType = document.getElementById('modal-item-expense-type');
                        if (elType) selectedType = elType.value;
                    }
                    
                    AppState.budgetData[m.year][m.month].itemMetadata[m.cat][fn] = selectedType === 'auto' ? (isDefaultFixed(fn) ? 'fixed' : 'variable') : selectedType;
                }
                
                saveToDatabase(); AppState.activeModal = null; renderApp();
            },
            
            saveAporte: () => {
                const m = AppState.activeModal;
                const assetVal = document.getElementById('modal-aporte-asset').value;
                const valStr = document.getElementById('modal-aporte-val').value;
                const numVal = parseCurrencyString(valStr);

                if (!assetVal) return alert("Selecione um ativo.");
                if (numVal <= 0) return alert("Insira um valor válido para o aporte.");

                const parts = assetVal.split('::');
                const cat = parts[0];
                const name = parts[1];

                if (!AppState.budgetData[m.year][m.month][cat]) AppState.budgetData[m.year][m.month][cat] = {};
                if (!AppState.budgetData[m.year][m.month].itemMetadata[cat]) AppState.budgetData[m.year][m.month].itemMetadata[cat] = {};
                
                const currentVal = AppState.budgetData[m.year][m.month][cat][name] || 0;
                AppState.budgetData[m.year][m.month][cat][name] = currentVal + numVal;

                saveToDatabase(); AppState.activeModal = null; renderApp();
            },

            saveCategory: () => {
                const m = AppState.activeModal;
                const name = document.getElementById('modal-cat-name').value.trim();
                if(!name) return alert("Preencha o nome da categoria.");
                
                if (m.oldName) {
                    if (name !== m.oldName && AppState.budgetData[m.year][m.month][name] === undefined) {
                        AppState.budgetData[m.year][m.month][name] = AppState.budgetData[m.year][m.month][m.oldName];
                        delete AppState.budgetData[m.year][m.month][m.oldName];
                        if (AppState.budgetData[m.year][m.month].itemMetadata[m.oldName]) {
                            AppState.budgetData[m.year][m.month].itemMetadata[name] = AppState.budgetData[m.year][m.month].itemMetadata[m.oldName];
                            delete AppState.budgetData[m.year][m.month].itemMetadata[m.oldName];
                        }
                        if (AppState.budgetData[m.year][m.month].categoriesMetadata[m.oldName]) {
                            AppState.budgetData[m.year][m.month].categoriesMetadata[name] = AppState.budgetData[m.year][m.month].categoriesMetadata[m.oldName];
                            delete AppState.budgetData[m.year][m.month].categoriesMetadata[m.oldName];
                        }
                    }
                } else {
                    if (AppState.budgetData[m.year][m.month][name] === undefined) {
                        AppState.budgetData[m.year][m.month][name] = {};
                        if (!AppState.budgetData[m.year][m.month].itemMetadata[name]) AppState.budgetData[m.year][m.month].itemMetadata[name] = {};
                        AppState.budgetData[m.year][m.month].categoriesMetadata[name] = 'expense';
                    }
                }
                saveToDatabase(); AppState.activeModal = null; renderApp();
            },

            saveGoal: () => {
                const m = AppState.activeModal;
                const name = document.getElementById('modal-goal-name').value.trim() || 'Objetivo';
                
                if (m.id) {
                    const startIdx = MONTHS.indexOf(m.month);
                    for (let i = startIdx; i < 12; i++) {
                        const mon = MONTHS[i];
                        if (AppState.budgetData[m.year][mon] && AppState.budgetData[m.year][mon].goals && AppState.budgetData[m.year][mon].goals[m.id]) {
                            AppState.budgetData[m.year][mon].goals[m.id].label = name;
                        }
                    }
                } else {
                    const newId = 'custom_' + Date.now();
                    const colorAssigned = DYNAMIC_COLORS[Object.keys(AppState.budgetData[m.year][m.month].goals || {}).length % DYNAMIC_COLORS.length];
                    const startIdx = MONTHS.indexOf(m.month);
                    for (let i = startIdx; i < 12; i++) {
                        const mon = MONTHS[i];
                        if (AppState.budgetData[m.year][mon]) {
                            if (!AppState.budgetData[m.year][mon].goals) AppState.budgetData[m.year][mon].goals = {};
                            AppState.budgetData[m.year][mon].goals[newId] = { label: name, value: 0, color: colorAssigned };
                        }
                    }
                }
                saveToDatabase(); AppState.activeModal = null; renderApp();
            },

            handleInputDebounced: (year, month, category, item, inputEl) => {
                const rawDigits = inputEl.value.replace(/\D/g, ''); inputEl.value = rawDigits ? formatCurrencyInput(Number(rawDigits) / 100) : '0,00';
                clearTimeout(typingTimer); typingTimer = setTimeout(() => { 
                    const numValue = parseCurrencyString(inputEl.value); 
                    if (!AppState.budgetData[year][month][category]) AppState.budgetData[year][month][category] = {};
                    if (AppState.budgetData[year][month][category][item] !== numValue) { AppState.budgetData[year][month][category][item] = numValue; saveToDatabase(); renderApp(); } 
                }, 1000);
            },
            handleBlur: (year, month, category, item, inputEl) => { 
                clearTimeout(typingTimer); const numValue = parseCurrencyString(inputEl.value); inputEl.value = formatCurrencyInput(numValue); 
                if (!AppState.budgetData[year][month][category]) AppState.budgetData[year][month][category] = {};
                if (AppState.budgetData[year][month][category][item] !== numValue) { AppState.budgetData[year][month][category][item] = numValue; saveToDatabase(); renderApp(); } 
            },
            handleYieldInputDebounced: (year, month, category, item, inputEl) => {
                const rawDigits = inputEl.value.replace(/\D/g, ''); inputEl.value = rawDigits ? formatCurrencyInput(Number(rawDigits) / 100) : '0,00';
                clearTimeout(typingTimer); typingTimer = setTimeout(() => { 
                    const numValue = parseCurrencyString(inputEl.value); 
                    if (!AppState.budgetData[year][month].itemMetadata[category]) AppState.budgetData[year][month].itemMetadata[category] = {};
                    if (AppState.budgetData[year][month].itemMetadata[category][`${item}_yield`] !== numValue) { AppState.budgetData[year][month].itemMetadata[category][`${item}_yield`] = numValue; saveToDatabase(); renderApp(); } 
                }, 1000);
            },
            handleYieldBlur: (year, month, category, item, inputEl) => { 
                clearTimeout(typingTimer); const numValue = parseCurrencyString(inputEl.value); inputEl.value = formatCurrencyInput(numValue); 
                if (!AppState.budgetData[year][month].itemMetadata[category]) AppState.budgetData[year][month].itemMetadata[category] = {};
                if (AppState.budgetData[year][month].itemMetadata[category][`${item}_yield`] !== numValue) { AppState.budgetData[year][month].itemMetadata[category][`${item}_yield`] = numValue; saveToDatabase(); renderApp(); } 
            },
            handleModalCurrencyInput: (el) => {
                const rawDigits = el.value.replace(/\D/g, ''); 
                el.value = rawDigits ? formatCurrencyInput(Number(rawDigits) / 100) : '0,00';
            },

            handleGoalInput: (id, val, renda) => {
                const numVal = parseInt(val) || 0; const percentEl = document.getElementById(`goal-val-${id}`); if(percentEl) percentEl.innerText = numVal + '%';
                const plannedVal = (numVal / 100) * Number(renda); const planValEl = document.getElementById(`plan-val-${id}`); if(planValEl) planValEl.innerText = formatCurrency(plannedVal);
                let total = 0; document.querySelectorAll('.goal-slider').forEach(s => total += parseInt(s.value) || 0);
                const isExc = total > 100; const totalText = document.getElementById('plan-total-text'); if(totalText) { totalText.innerText = total + '%'; totalText.className = isExc ? 'text-rose-500 font-bold' : 'text-blue-600 font-bold'; }
                const totalBar = document.getElementById('plan-total-bar'); if(totalBar) { totalBar.style.width = Math.min(100, total) + '%'; totalBar.className = `h-full transition-all ${isExc ? 'bg-rose-500' : 'bg-blue-500'}`; }
                const excMsg = document.getElementById('plan-exc-msg'); if(excMsg) excMsg.style.display = isExc ? 'block' : 'none';
            },
            handleGoalChange: (year, month, id, val) => {
                const numValue = parseInt(val) || 0; 
                if (!AppState.budgetData[year][month].goals) return;
                const startIdx = MONTHS.indexOf(month);
                for (let i = startIdx; i < 12; i++) {
                    const m = MONTHS[i];
                    if (AppState.budgetData[year][m]) {
                        if (!AppState.budgetData[year][m].goals) AppState.budgetData[year][m].goals = {};
                        if (!AppState.budgetData[year][m].goals[id]) {
                            if (AppState.budgetData[year][month].goals[id]) { AppState.budgetData[year][m].goals[id] = deepClone(AppState.budgetData[year][month].goals[id]); } else { continue; }
                        }
                        AppState.budgetData[year][m].goals[id].value = numValue;
                    }
                }
                saveToDatabase(); renderApp();
            },
            
            handleTypeChange: (year, month, category, item, newType) => { if (!AppState.budgetData[year][month].itemMetadata[category]) AppState.budgetData[year][month].itemMetadata[category] = {}; AppState.budgetData[year][month].itemMetadata[category][item] = newType; saveToDatabase(); renderApp(); },
            handleInstChange: (year, month, category, item, instName) => { if (!AppState.budgetData[year][month].itemMetadata[category]) AppState.budgetData[year][month].itemMetadata[category] = {}; AppState.budgetData[year][month].itemMetadata[category][`${item}_inst`] = instName.trim(); saveToDatabase(); },
            
            copyFromPreviousMonth: (tabType) => { 
                let pm = AppState.currentMonthIdx - 1; let py = AppState.currentYear; 
                if (pm < 0) { pm = 11; py = (parseInt(AppState.currentYear) - 1).toString(); } 
                if (!AppState.budgetData[py] || !AppState.budgetData[py][MONTHS[pm]]) return; 
                
                let prevData = AppState.budgetData[py][MONTHS[pm]]; 
                let currentData = AppState.budgetData[AppState.currentYear][AppState.currentMonth];
                const meta = prevData.categoriesMetadata || DEFAULT_METADATA;

                Object.keys(prevData).forEach(cat => {
                    if (['goals', 'itemMetadata', 'categoriesMetadata'].includes(cat)) return;
                    const catType = meta[cat] || CATEGORIES_CONFIG[cat]?.type;
                    
                    if (tabType === 'income' && (catType === 'income' || cat === 'Renda Familiar')) {
                        currentData[cat] = deepClone(prevData[cat]);
                        if(!currentData.itemMetadata) currentData.itemMetadata = {};
                        if(prevData.itemMetadata && prevData.itemMetadata[cat]) { currentData.itemMetadata[cat] = deepClone(prevData.itemMetadata[cat]); }
                        if(!currentData.categoriesMetadata) currentData.categoriesMetadata = {};
                        currentData.categoriesMetadata[cat] = 'income';
                    }
                    if (tabType === 'expense' && catType === 'expense') {
                        currentData[cat] = deepClone(prevData[cat]);
                        if(!currentData.itemMetadata) currentData.itemMetadata = {};
                        if(prevData.itemMetadata && prevData.itemMetadata[cat]) { currentData.itemMetadata[cat] = deepClone(prevData.itemMetadata[cat]); }
                        if(!currentData.categoriesMetadata) currentData.categoriesMetadata = {};
                        currentData.categoriesMetadata[cat] = 'expense';
                    }
                });

                saveToDatabase(); renderApp(); 
            },
            
            deleteItem: (year, month, cat, name) => { 
                const isInvest = (AppState.budgetData[year][month].categoriesMetadata?.[cat] || CATEGORIES_CONFIG[cat]?.type) === 'investment';
                if (isInvest) {
                    Object.keys(AppState.budgetData).forEach(y => {
                        Object.keys(AppState.budgetData[y]).forEach(m => {
                            if (AppState.budgetData[y][m][cat] && AppState.budgetData[y][m][cat][name] !== undefined) {
                                delete AppState.budgetData[y][m][cat][name];
                                if (AppState.budgetData[y][m].itemMetadata?.[cat]) {
                                    delete AppState.budgetData[y][m].itemMetadata[cat][name];
                                    delete AppState.budgetData[y][m].itemMetadata[cat][`${name}_inst`];
                                    delete AppState.budgetData[y][m].itemMetadata[cat][`${name}_yield`];
                                }
                            }
                        });
                    });
                } else {
                    delete AppState.budgetData[year][month][cat][name]; 
                    if (AppState.budgetData[year][month].itemMetadata[cat]) { 
                        delete AppState.budgetData[year][month].itemMetadata[cat][name]; 
                        delete AppState.budgetData[year][month].itemMetadata[cat][`${name}_inst`]; 
                        delete AppState.budgetData[year][month].itemMetadata[cat][`${name}_yield`]; 
                    } 
                }
                saveToDatabase(); renderApp(); 
            },

            changeInvestFilter: (filterName, value) => {
                if (filterName === 'year') AppState.investFilterYear = value;
                if (filterName === 'type') { AppState.investFilterType = value; AppState.investFilterAsset = 'all'; }
                if (filterName === 'asset') AppState.investFilterAsset = value;
                if (filterName === 'metric') AppState.investFilterMetric = value;
                renderApp();
            },
            changeRendaFilter: (value) => { AppState.rendaFilterItem = value; renderApp(); }
        };

                        <div class="space-y-4">
                            <div>
                                <label class="text-[10px] font-bold text-slate-500 uppercase">Selecione o Ativo</label>
                                <select id="modal-aporte-asset" class="w-full mt-1 p-3 bg-slate-50 border border-slate-200 rounded-xl text-sm outline-none focus:border-blue-500">
                                    ${optionsHTML}
                                </select>
                            </div>
                            <div>
                                <label class="text-[10px] font-bold text-slate-500 uppercase">Valor do Aporte (R$)</label>
                                <input type="text" id="modal-aporte-val" class="w-full mt-1 p-3 bg-slate-50 border border-slate-200 rounded-xl text-sm outline-none focus:border-blue-500" placeholder="0,00" oninput="AppActions.handleModalCurrencyInput(this)" />
                            </div>
                        </div>
                        <div class="flex gap-3 justify-end mt-6">
                            <button onclick="AppActions.closeModal()" class="px-4 py-2 rounded-xl text-xs md:text-sm font-bold text-slate-600 hover:bg-slate-100 transition-colors">Cancelar</button>
                            <button onclick="AppActions.saveAporte()" class="px-4 py-2 rounded-xl text-xs md:text-sm font-bold text-white bg-blue-600 hover:bg-blue-700 transition-colors" ${assetsList.length===0?'disabled':''}>Adicionar Aporte</button>
                        </div>
                    </div>`;
                } else if (m.type === 'addItem') {
                    content = `
                    <div class="bg-white rounded-3xl p-6 md:p-8 max-w-sm w-full shadow-2xl">
                        <h3 class="text-lg md:text-xl font-bold text-slate-800 mb-4">${m.cat === 'Investimento' ? 'Novo Ativo' : 'Novo Registro'}</h3>
                        <div class="space-y-4">
                            <div>
                                <label class="text-[10px] font-bold text-slate-500 uppercase">Nome / Descrição</label>
                                <input type="text" id="modal-item-name" class="w-full mt-1 p-3 bg-slate-50 border border-slate-200 rounded-xl text-sm outline-none focus:border-blue-500" placeholder="Ex: ${m.cat === 'Renda Familiar' ? 'Salário Extra' : m.cat === 'Investimento' ? 'Ações Petrobras' : 'Nova Conta'}" />
                            </div>
                            <div>
                                <label class="text-[10px] font-bold text-slate-500 uppercase">Valor do Mês (R$)</label>
                                <input type="text" id="modal-item-val" class="w-full mt-1 p-3 bg-slate-50 border border-slate-200 rounded-xl text-sm outline-none focus:border-blue-500" placeholder="0,00" oninput="AppActions.handleModalCurrencyInput(this)" />
                            </div>
                            ${m.cat !== 'Renda Familiar' && m.cat !== 'Investimento' ? `
                            <div>
                                <label class="text-[10px] font-bold text-slate-500 uppercase">Tipo de Despesa</label>
                                <select id="modal-item-expense-type" class="w-full mt-1 p-3 bg-slate-50 border border-slate-200 rounded-xl text-sm outline-none focus:border-blue-500">
                                    <option value="variable">Variável</option>
                                    <option value="fixed">Fixa</option>
                                </select>
                            </div>
                            ` : ''}
                            ${m.cat === 'Investimento' ? `
                            <div>
                                <label class="text-[10px] font-bold text-slate-500 uppercase">Instituição</label>
                                <input type="text" id="modal-item-inst" class="w-full mt-1 p-3 bg-slate-50 border border-slate-200 rounded-xl text-sm outline-none focus:border-blue-500" placeholder="Ex: Itaú, XP..." />
                            </div>
                            <div>
                                <label class="text-[10px] font-bold text-slate-500 uppercase">Tipo</label>
                                <select id="modal-item-type" class="w-full mt-1 p-3 bg-slate-50 border border-slate-200 rounded-xl text-sm outline-none focus:border-blue-500">
                                    <option value="variavel">Variável</option>
                                    <option value="fixa">Fixa</option>
                                    <option value="reserva">Reserva</option>
                                    <option value="cripto">Cripto</option>
                                </select>
                            </div>
                            ` : ''}
                        </div>
                        <div class="flex gap-3 justify-end mt-6">
                            <button onclick="AppActions.closeModal()" class="px-4 py-2 rounded-xl text-xs md:text-sm font-bold text-slate-600 hover:bg-slate-100 transition-colors">Cancelar</button>
                            <button onclick="AppActions.saveNewItem()" class="px-4 py-2 rounded-xl text-xs md:text-sm font-bold text-white bg-blue-600 hover:bg-blue-700 transition-colors">Adicionar</button>
                        </div>
                    </div>`;
                } else if (m.type === 'category') {
                    content = `
                    <div class="bg-white rounded-3xl p-6 md:p-8 max-w-sm w-full shadow-2xl">
                        <h3 class="text-lg md:text-xl font-bold text-slate-800 mb-4">${m.oldName ? 'Editar Categoria' : 'Nova Categoria'}</h3>
                        <div class="space-y-4">
                            <div>
                                <label class="text-[10px] font-bold text-slate-500 uppercase">Nome da Categoria</label>
                                <input type="text" id="modal-cat-name" value="${m.oldName || ''}" class="w-full mt-1 p-3 bg-slate-50 border border-slate-200 rounded-xl text-sm outline-none focus:border-blue-500" placeholder="Ex: Moradia, Lazer..." />
                            </div>
                        </div>
                        <div class="flex gap-3 justify-end mt-6">
                            <button onclick="AppActions.closeModal()" class="px-4 py-2 rounded-xl text-xs md:text-sm font-bold text-slate-600 hover:bg-slate-100 transition-colors">Cancelar</button>
                            <button onclick="AppActions.saveCategory()" class="px-4 py-2 rounded-xl text-xs md:text-sm font-bold text-white bg-blue-600 hover:bg-blue-700 transition-colors">Salvar</button>
                        </div>
                    </div>`;
                } else if (m.type === 'goal') {
                    content = `
                    <div class="bg-white rounded-3xl p-6 md:p-8 max-w-sm w-full shadow-2xl">
                        <h3 class="text-lg md:text-xl font-bold text-slate-800 mb-4">${m.id ? 'Editar Planejamento' : 'Novo Planejamento'}</h3>
                        <div class="space-y-4">
                            <div>
                                <label class="text-[10px] font-bold text-slate-500 uppercase">Nome do Planejamento</label>
                                <input type="text" id="modal-goal-name" value="${m.oldName || ''}" class="w-full mt-1 p-3 bg-slate-50 border border-slate-200 rounded-xl text-sm outline-none focus:border-blue-500" placeholder="Ex: Viagem, Carro Novo..." />
                            </div>
                        </div>
                        <div class="flex gap-3 justify-end mt-6">
                            <button onclick="AppActions.closeModal()" class="px-4 py-2 rounded-xl text-xs md:text-sm font-bold text-slate-600 hover:bg-slate-100 transition-colors">Cancelar</button>
                            <button onclick="AppActions.saveGoal()" class="px-4 py-2 rounded-xl text-xs md:text-sm font-bold text-white bg-blue-600 hover:bg-blue-700 transition-colors">Salvar</button>
                        </div>
                    </div>`;
                }
            }

            root.innerHTML = `<div class="fixed inset-0 z-50 flex items-center justify-center bg-slate-900/50 backdrop-blur-sm px-4 shadow-2xl">${content}</div>`;
            if(content) lucide.createIcons();
        }

        function renderApp() {
            if (AppState.loading) return;
            const root = document.getElementById('app-root');
            
            const activeEl = document.activeElement;
            const focusState = (activeEl && activeEl.id) ? { id: activeEl.id, selectionStart: activeEl.selectionStart, selectionEnd: activeEl.selectionEnd } : null;

            destroyCharts();

            let contentHTML = '';
            if(AppState.activeTab === 'dashboard') contentHTML = renderDashboard();
            else if(AppState.activeTab === 'renda') contentHTML = renderRenda();
            else if(AppState.activeTab === 'gastos') contentHTML = renderGastos();
            else if(AppState.activeTab === 'investimento') contentHTML = renderInvestimento();
            else if(AppState.activeTab === 'planejamento') contentHTML = renderPlanejamento();
            else if(AppState.activeTab === 'historico') contentHTML = renderHistorico();

            root.innerHTML = `
                ${renderHeader()}
                <main class="max-w-7xl mx-auto px-4 mt-4 md:mt-6">
                    ${contentHTML}
                </main>
            `;

            lucide.createIcons();
            renderModal();
            updateSyncUI();

            if (focusState && focusState.id) {
                const el = document.getElementById(focusState.id);
                if (el) {
                    el.focus();
                    try {
                        if (el.tagName === 'INPUT' && (el.type === 'text' || el.type === 'tel')) {
                            el.setSelectionRange(focusState.selectionStart, focusState.selectionEnd);
                        }
                    } catch(e){} 
                }
            }
        }

        // --- INICIALIZAÇÃO COM FECHADURA DE SEGURANÇA ---
        async function initAuth() {
            try {
                const { data: { user } } = await supabaseClient.auth.getUser();
                if (!user) {
                    AppActions.sair();
                    return;
                }
                
                AppState.user = user;

                if (user.email === 'dauan.silva98@gmail.com') {
                    setTimeout(() => {
                        const btnAdmin = document.getElementById('btn-admin-secreto');
                        if (btnAdmin) btnAdmin.classList.remove('hidden');
                    }, 500);
                }
                
                const { data: profile, error: profileError } = await supabaseClient
                    .from('profiles')
                    .select('subscription_status')
                    .eq('id', user.id)
                    .single();

                if (profileError || !profile || profile.subscription_status !== 'active') {
                    console.log("Acesso negado: Assinatura não está ativa.");
                    window.location.href = "cadastro.html"; 
                    return; 
                }
                
                await loadDatabaseData();
                
            } catch (error) {
                console.error("Auth error:", error);
                AppState.errorMsg = "Erro na autenticação. Tente novamente.";
                AppState.loading = false;
                renderApp();
            }
        }

        // Inicia a aplicação
        initAuth();

    </script>
</body>
</html>
