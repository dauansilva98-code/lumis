<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumis - Organizador Financeiro</title>
    
    <script>
      // CORREÇÃO 1: Se não estiver logado, redireciona para login.html
      if (localStorage.getItem("logado") !== "sim") {
        window.location.href = "login.html";
      }
    </script>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0"></script>

<body class="bg-[#f8fafc] text-slate-800 pb-20 font-sans">

    <div id="app-root">
        <div class="min-h-screen flex flex-col items-center justify-center bg-[#f8fafc]">
            <i data-lucide="loader-2" class="w-10 h-10 text-blue-600 animate-spin mb-4"></i>
            <p class="text-slate-500 font-medium text-sm">Validando acesso e carregando...</p>
        </div>
    </div>

    <div id="modal-root"></div>

    <script>
        // --- CONFIGURAÇÃO DO SUPABASE ---
        const SUPABASE_URL = 'https://izmdjkalwgupuehrbcxm.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml6bWRqa2Fsd2d1cHVlaHJiY3htIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzAyNDkwNTUsImV4cCI6MjA4NTgyNTA1NX0.w3FW5oORqiEjT0Xj3d3777KfE0xl2zm0ogezpfN3Gss'; 
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // --- CONSTANTES E CONFIGURAÇÕES PADRÃO ---
        const MONTHS = ['Janeiro', 'Fevereiro', 'Março', 'Abril', 'Maio', 'Junho', 'Julho', 'Agosto', 'Setembro', 'Outubro', 'Novembro', 'Dezembro'];
        const ICON_MAP = { Wallet: 'wallet', Home: 'home', HeartPulse: 'heart-pulse', Bus: 'bus', Car: 'car', Church: 'church', Smile: 'smile', TrendingUp: 'trending-up', CreditCard: 'credit-card', Receipt: 'receipt' };

        const DEFAULT_METADATA = {
            'Renda Familiar': 'income', 'Casa': 'expense', 'Saúde': 'expense', 'Automóvel': 'expense',
            'Transporte': 'expense', 'Cartão de Crédito': 'expense', 'Investimento': 'investment'
        };

        const CATEGORIES_CONFIG = {
            'Renda Familiar': { icon: 'Wallet', type: 'income', items: ['Salário Principal', 'Salário Secundário', 'Renda Extra', 'Outros'] },
            'Casa': { icon: 'Home', type: 'expense', items: ['Aluguel / Prestação', 'Condomínio', 'Luz', 'Água', 'Internet', 'Mercado', 'Gás'] },
            'Automóvel': { icon: 'Car', type: 'expense', items: ['Parcela do Carro', 'Combustível', 'Seguro', 'IPVA', 'Mecânico', 'Lavagem'] },
            'Saúde': { icon: 'HeartPulse', type: 'expense', items: ['Plano de Saúde', 'Farmácia', 'Consultas', 'Outros'] },
            'Transporte': { icon: 'Bus', type: 'expense', items: ['Transporte Público', 'Aplicativos (Uber/99)'] },
            'Lazer': { icon: 'Smile', type: 'expense', items: ['Alimentação fora', 'Assinaturas (Netflix, etc)', 'Passeios', 'Compras'] },
            'Cartão de Crédito': { icon: 'CreditCard', type: 'expense', items: ['Cartão Principal', 'Cartão Adicional'] },
            'Investimento': { icon: 'TrendingUp', type: 'investment', items: ['Reserva de Emergência', 'Renda Fixa', 'Renda Variável'] },
        };

        const COLORS_GERAL = ['#0ea5e9', '#ec4899', '#10b981', '#8b5cf6', '#f59e0b', '#6366f1', '#f43f5e', '#14b8a6'];
        const COLORS_INCOME = ['#10b981', '#3b82f6', '#f59e0b', '#8b5cf6', '#ec4899', '#14b8a6', '#f43f5e', '#6366f1'];
        const COLORS_CC = ['#8b5cf6', '#f59e0b', '#ec4899', '#10b981', '#3b82f6', '#f43f5e', '#14b8a6'];
        
        // Cores Dinâmicas estendidas para suportar muitos ativos de investimento
        const EXTENDED_COLORS = ['#3b82f6', '#10b981', '#8b5cf6', '#f59e0b', '#ec4899', '#14b8a6', '#f43f5e', '#6366f1', '#0ea5e9', '#84cc16', '#a855f7', '#d946ef'];
        
        const FIXED_INVEST_COLORS = { 'Reserva': '#3b82f6', 'Renda Fixa': '#10b981', 'Renda Variável': '#8b5cf6', 'Criptomoedas': '#f59e0b' };
        
        const GOAL_COLORS = {
            blue: { text: 'text-blue-600', hex: '#3b82f6' }, pink: { text: 'text-pink-600', hex: '#ec4899' },
            emerald: { text: 'text-emerald-600', hex: '#10b981' }, purple: { text: 'text-purple-600', hex: '#a855f7' },
            amber: { text: 'text-amber-500', hex: '#f59e0b' }, orange: { text: 'text-orange-500', hex: '#f97316' },
            teal: { text: 'text-teal-500', hex: '#14b8a6' }
        };
        const DYNAMIC_COLORS = ['purple', 'amber', 'orange', 'teal'];
        const DEFAULT_FIXED_ITEMS = ['Condomínio', 'Luz', 'Água', 'Internet', 'Aluguel', 'Prestação', 'Plano de Saúde', 'Parcela do Carro', 'IPVA', 'Seguro', 'Assinaturas'];
        const isDefaultFixed = (itemName) => DEFAULT_FIXED_ITEMS.some(keyword => itemName.toLowerCase().includes(keyword.toLowerCase()));

        function generateEmptyYearData() {
            let data = {};
            MONTHS.forEach(m => {
                data[m] = { 
                    goals: { 
                        fixed: { label: 'Contas Fixas', value: 50, color: 'blue' }, 
                        variable: { label: 'Despesas Variáveis', value: 30, color: 'pink' }, 
                        investment: { label: 'Investimentos', value: 20, color: 'emerald' } 
                    }, 
                    itemMetadata: {}, 
                    categoriesMetadata: { ...DEFAULT_METADATA } 
                };
                Object.keys(CATEGORIES_CONFIG).forEach(cat => {
                    data[m][cat] = {}; data[m].itemMetadata[cat] = {};
                    CATEGORIES_CONFIG[cat].items.forEach(item => {
                        data[m][cat][item] = 0;
                        if (CATEGORIES_CONFIG[cat].type === 'investment') data[m].itemMetadata[cat][item] = item.toLowerCase().includes('reserva') ? 'reserva' : item.toLowerCase().includes('fixa') ? 'fixa' : 'variavel';
                        else data[m].itemMetadata[cat][item] = isDefaultFixed(item) ? 'fixed' : 'variable';
                    });
                });
            });
            return data;
        }

        function deepClone(obj) { return JSON.parse(JSON.stringify(obj)); }
        function safeId(str) { return str.toString().replace(/[^a-z0-9]/gi, '-').toLowerCase(); }

        // --- ESTADO GLOBAL DA APLICAÇÃO ---
        const currentYearString = new Date().getFullYear().toString();
        
        const AppState = {
            user: null, budgetData: { [currentYearString]: generateEmptyYearData() }, currentYear: currentYearString,
            currentMonthIdx: new Date().getMonth(), activeTab: 'dashboard', loading: true, saving: false, errorMsg: null,
            showSyncSuccess: false, syncSuccessTimer: null,
            confirmMonthChange: null, confirmDeleteItem: null, charts: {}, 
            investFilterYear: currentYearString, investFilterType: 'all', investFilterAsset: 'all', investFilterMetric: 'todos',
            rendaFilterItem: 'all',
            get currentMonth() { return MONTHS[this.currentMonthIdx]; },
            get currentData() { return this.budgetData[this.currentYear][this.currentMonth]; }
        };

        // --- FUNÇÕES UTILITÁRIAS ---
        function formatCurrency(value) { return new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(value || 0); }
        function parseCurrencyString(val) { const raw = String(val).replace(/\D/g, ''); return raw ? Number(raw) / 100 : 0; }
        function formatCurrencyInput(val) { const num = Number(val); if (isNaN(num)) return '0,00'; return new Intl.NumberFormat('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 }).format(num); }
        function getCategoryIconAndColor(catName) { if (CATEGORIES_CONFIG[catName]) return { ...CATEGORIES_CONFIG[catName], color: 'text-slate-600', bg: 'bg-slate-100' }; return { icon: 'Receipt', color: 'text-slate-600', bg: 'bg-slate-100', type: 'expense' }; }
        function getCategoryTotal(year, month, category) { if (!AppState.budgetData[year] || !AppState.budgetData[year][month] || !AppState.budgetData[year][month][category]) return 0; return Object.values(AppState.budgetData[year][month][category]).reduce((acc, val) => acc + (Number(val) || 0), 0); }

        // --- CÁLCULO DE ACÚMULO E RENDIMENTOS DE INVESTIMENTOS ---
        function getAccumulatedAssetDetails(upToYearStr, upToMonthIdx) {
            let assets = {}; 
            const allYears = Object.keys(AppState.budgetData).sort();
            
            for (const y of allYears) {
                if (Number(y) > Number(upToYearStr)) continue;
                const maxMonth = (y === upToYearStr) ? upToMonthIdx : 11;
                
                for (let i = 0; i <= maxMonth; i++) {
                    const m = MONTHS[i];
                    if (AppState.budgetData[y] && AppState.budgetData[y][m]) {
                        const monthData = AppState.budgetData[y][m];
                        const meta = monthData.categoriesMetadata || DEFAULT_METADATA;
                        Object.keys(monthData).forEach(cat => {
                            if (!['goals', 'itemMetadata', 'categoriesMetadata'].includes(cat) && (meta[cat] || CATEGORIES_CONFIG[cat]?.type) === 'investment') {
                                Object.entries(monthData[cat]).forEach(([name, val]) => {
                                    const numVal = Number(val) || 0; // Aporte do mês
                                    const yieldVal = Number(monthData.itemMetadata?.[cat]?.[`${name}_yield`]) || 0; // Rendimento do mês
                                    const type = monthData.itemMetadata?.[cat]?.[name] || (name.toLowerCase().includes('reserva')?'reserva':name.toLowerCase().includes('fixa')?'fixa':'variavel');
                                    const inst = monthData.itemMetadata?.[cat]?.[`${name}_inst`] || '';
                                    
                                    if (!assets[name]) assets[name] = { invested: 0, yield: 0, type: type, cat: cat, inst: inst };
                                    assets[name].invested += numVal;
                                    assets[name].yield += yieldVal;
                                    
                                    if (monthData.itemMetadata?.[cat]?.[name]) assets[name].type = monthData.itemMetadata[cat][name];
                                    if (monthData.itemMetadata?.[cat]?.[`${name}_inst`] !== undefined) assets[name].inst = monthData.itemMetadata[cat][`${name}_inst`];
                                });
                            }
                        });
                    }
                }
            }
            return { assets };
        }

        // --- CÁLCULOS E MÉTRICAS ---
        function calculateMetrics() {
            const calcMonth = (y, m) => {
                let renda = 0, gastos = 0, fixos = 0, variaveis = 0, investimentosMes = 0, reservaMesAtual = 0;
                if(!AppState.budgetData[y] || !AppState.budgetData[y][m]) return { renda, gastos, saldo: 0, fixos, variaveis, investimentosMes, reservaMesAtual };

                Object.keys(AppState.budgetData[y][m]).forEach(cat => {
                    if (['goals', 'itemMetadata', 'categoriesMetadata'].includes(cat)) return;
                    const config = CATEGORIES_CONFIG[cat] || { type: 'expense' };
                    const catMetaType = AppState.budgetData[y][m].categoriesMetadata?.[cat] || config.type || 'expense';

                    if (catMetaType === 'income' || cat === 'Renda Familiar') {
                        renda += getCategoryTotal(y, m, cat);
                    } else if (catMetaType === 'investment' || cat === 'Investimento') {
                        Object.entries(AppState.budgetData[y][m][cat]).forEach(([item, val]) => {
                            const numVal = Number(val) || 0; // Aporte do mês entra no saldo da conta corrente
                            const type = AppState.budgetData[y][m].itemMetadata?.[cat]?.[item] || (item.toLowerCase().includes('reserva') ? 'reserva' : item.toLowerCase().includes('fixa') ? 'fixa' : 'variavel');
                            if(type === 'reserva') reservaMesAtual += numVal;
                            else investimentosMes += numVal;
                        });
                    } else {
                        Object.entries(AppState.budgetData[y][m][cat]).forEach(([item, val]) => {
                            const numVal = Number(val) || 0; gastos += numVal;
                            const type = AppState.budgetData[y][m].itemMetadata?.[cat]?.[item] || 'variable';
                            if (type === 'fixed') fixos += numVal; else variaveis += numVal;
                        });
                    }
                });
                return { renda, gastos, saldo: renda - (gastos + investimentosMes + reservaMesAtual), fixos, variaveis, investimentosMes, reservaMesAtual };
            };

            const current = calcMonth(AppState.currentYear, AppState.currentMonth);
            let acumulado = 0;
            const historyList = [];

            for (let i = 0; i < 12; i++) {
                const mData = calcMonth(AppState.currentYear, MONTHS[i]);
                acumulado += mData.saldo;
                historyList.push({ month: MONTHS[i], renda: mData.renda, gastos: mData.gastos, investido: mData.investimentosMes + mData.reservaMesAtual, saldo: mData.saldo });
            }

            const custoDeVida = current.fixos;
            
            // Busca a reserva total acumulada para os cards de meta
            const accDetails = getAccumulatedAssetDetails(AppState.currentYear, 11);
            let reservaTotalAcumulada = 0;
            Object.values(accDetails.assets).forEach(data => {
                if (data.type === 'reserva') reservaTotalAcumulada += (data.invested + data.yield);
            });

            return { totals: { ...current, acumulado }, metrics: { custoDeVida, metaReserva6m: custoDeVida * 6, metaReserva12m: custoDeVida * 12, reservaTotalAcumulada }, historyData: historyList };
        }

        // --- BANCO DE DADOS (SUPABASE) ---
        function updateSyncUI() {
            const syncEl = document.getElementById('sync-status');
            let statusHTML = '';
            
            if (AppState.errorMsg) {
                statusHTML = `<span class="flex items-center gap-1 text-rose-500"><i data-lucide="alert-circle" class="w-4 h-4"></i> <span class="hidden sm:inline">${AppState.errorMsg}</span></span>`;
            } else if (AppState.saving) {
                statusHTML = `<span class="flex items-center gap-1 text-slate-500"><i data-lucide="loader-2" class="w-4 h-4 animate-spin"></i> <span class="hidden sm:inline">Salvando...</span></span>`;
            } else if (AppState.showSyncSuccess) {
                statusHTML = `<span class="flex items-center gap-1 text-emerald-600 transition-opacity duration-300"><i data-lucide="check-circle-2" class="w-4 h-4"></i> <span class="hidden sm:inline">Salvo</span></span>`;
            }
            
            if (syncEl) syncEl.innerHTML = statusHTML; 
            lucide.createIcons();
        }

        function mergeServerData(serverData) {
            if (!serverData || typeof serverData !== 'object' || serverData.incomes || serverData.bills) return deepClone(AppState.budgetData);
            let parsedData = serverData; if (parsedData['Janeiro'] && !parsedData[currentYearString]) parsedData = { [currentYearString]: parsedData };
            let newData = deepClone(AppState.budgetData);
            
            Object.keys(parsedData).forEach(year => {
                if (!newData[year]) newData[year] = generateEmptyYearData();
                Object.keys(parsedData[year]).forEach(m => {
                    if (newData[year][m]) {
                        if (parsedData[year][m].goals) {
                            if (typeof parsedData[year][m].goals.fixed === 'number') newData[year][m].goals = { fixed: { label: 'Contas Fixas', value: parsedData[year][m].goals.fixed || 0, color: 'blue' }, variable: { label: 'Despesas Variáveis', value: parsedData[year][m].goals.variable || 0, color: 'pink' }, investment: { label: 'Investimentos', value: parsedData[year][m].goals.investment || 0, color: 'emerald' } };
                            else newData[year][m].goals = parsedData[year][m].goals;
                        }
                        Object.keys(newData[year][m]).forEach(k => { if (!['goals', 'itemMetadata', 'categoriesMetadata'].includes(k)) delete newData[year][m][k]; });
                        if (!newData[year][m].itemMetadata) newData[year][m].itemMetadata = {};
                        
                        newData[year][m].categoriesMetadata = parsedData[year][m].categoriesMetadata || { ...DEFAULT_METADATA };
                        Object.keys(newData[year][m].categoriesMetadata).forEach(cat => { if (['fixed', 'variable', 'tithe'].includes(newData[year][m].categoriesMetadata[cat])) newData[year][m].categoriesMetadata[cat] = 'expense'; });

                        Object.keys(parsedData[year][m]).forEach(cat => {
                            if (!['goals', 'itemMetadata', 'categoriesMetadata'].includes(cat)) {
                                newData[year][m][cat] = {}; if (!newData[year][m].itemMetadata[cat]) newData[year][m].itemMetadata[cat] = {};
                                Object.keys(parsedData[year][m][cat]).forEach(item => {
                                    newData[year][m][cat][item] = parsedData[year][m][cat][item];
                                    if (parsedData[year][m].itemMetadata?.[cat]?.[item]) newData[year][m].itemMetadata[cat][item] = parsedData[year][m].itemMetadata[cat][item];
                                    else { const catConfig = CATEGORIES_CONFIG[cat]; if (catConfig?.type === 'investment') newData[year][m].itemMetadata[cat][item] = item.toLowerCase().includes('reserva') ? 'reserva' : item.toLowerCase().includes('fixa') ? 'fixa' : 'variavel'; else newData[year][m].itemMetadata[cat][item] = isDefaultFixed(item) ? 'fixed' : 'variable'; }
                                    if (parsedData[year][m].itemMetadata?.[cat]?.[`${item}_inst`] !== undefined) newData[year][m].itemMetadata[cat][`${item}_inst`] = parsedData[year][m].itemMetadata[cat][`${item}_inst`];
                                    if (parsedData[year][m].itemMetadata?.[cat]?.[`${item}_yield`] !== undefined) newData[year][m].itemMetadata[cat][`${item}_yield`] = parsedData[year][m].itemMetadata[cat][`${item}_yield`];
                                });
                            }
                        });
                    }
                });
            });
            return newData;
        }

        async function saveToDatabase() {
            AppState.saving = true; AppState.errorMsg = null; AppState.showSyncSuccess = false; updateSyncUI();
            try {
                if (!AppState.user) return;
                const { error } = await supabaseClient.from('dados_financeiros').upsert({ id: AppState.user.id, payload: AppState.budgetData, updated_at: new Date() });
                if (error) throw error;
                
                AppState.showSyncSuccess = true;
                clearTimeout(AppState.syncSuccessTimer);
                AppState.syncSuccessTimer = setTimeout(() => {
                    AppState.showSyncSuccess = false;
                    updateSyncUI();
                }, 3000);

            } catch (error) { AppState.errorMsg = "Falha ao salvar."; } finally { AppState.saving = false; updateSyncUI(); }
        }

        async function loadDatabaseData() {
            try {
                if (!AppState.user) return;
                const { data, error } = await supabaseClient.from('dados_financeiros').select('payload').eq('id', AppState.user.id).single();
                if (data && data.payload) AppState.budgetData = mergeServerData(data.payload);
            } catch (error) {} finally { AppState.loading = false; renderApp(); }
        }

        // --- AÇÕES DO USUÁRIO & DEBOUNCE ---
        let typingTimer;

        window.AppActions = {
            // CORREÇÃO 2: Botão Sair redireciona para login.html
            sair: async () => { await supabaseClient.auth.signOut(); localStorage.removeItem("logado"); window.location.href = "login.html"; },
            changeTab: (tabId) => { AppState.activeTab = tabId; renderApp(); },
            changeYear: (delta) => { 
                const newYearStr = (parseInt(AppState.currentYear) + delta).toString(); 
                if (!AppState.budgetData[newYearStr]) { 
                    // Copia a estrutura do último mês salvo para não gerar itens do zero, mas zera os valores
                    let lastMonthData = null;
                    const years = Object.keys(AppState.budgetData).sort();
                    if (years.length > 0) {
                        const lastYear = years[years.length - 1];
                        lastMonthData = AppState.budgetData[lastYear]['Dezembro'] || AppState.budgetData[lastYear][MONTHS[11]];
                    }
                    
                    let newData = {};
                    MONTHS.forEach(m => {
                        newData[m] = lastMonthData ? deepClone(lastMonthData) : generateEmptyYearData()['Janeiro'];
                        // Zera os valores financeiros do novo ano
                        Object.keys(newData[m]).forEach(cat => {
                            if (!['goals', 'itemMetadata', 'categoriesMetadata'].includes(cat)) {
                                Object.keys(newData[m][cat]).forEach(item => {
                                    newData[m][cat][item] = 0;
                                    if (newData[m].itemMetadata?.[cat]?.[`${item}_yield`] !== undefined) {
                                        newData[m].itemMetadata[cat][`${item}_yield`] = 0;
                                    }
                                });
                            }
                        });
                    });
                    AppState.budgetData[newYearStr] = newData; 
                    saveToDatabase(); 
                } 
                AppState.currentYear = newYearStr; 
                AppState.investFilterYear = newYearStr; // Atualiza o filtro de ano do grafico
                renderApp(); 
            },
            prevMonth: () => { if (AppState.currentMonthIdx > 0) { AppState.currentMonthIdx--; renderApp(); } },
            nextMonthConfirm: () => { if (AppState.currentMonthIdx < 11) { AppState.currentMonthIdx + 1; renderModal(); } },
            closeModal: () => { AppState.confirmMonthChange = null; renderModal(); },
            confirmMonthChange: () => { AppState.currentMonthIdx = AppState.confirmMonthChange; AppState.confirmMonthChange = null; renderApp(); },
            
            handleInputDebounced: (year, month, category, item, inputEl) => {
                const rawDigits = inputEl.value.replace(/\D/g, ''); inputEl.value = rawDigits ? formatCurrencyInput(Number(rawDigits) / 100) : '0,00';
                clearTimeout(typingTimer); typingTimer = setTimeout(() => { 
                    const numValue = parseCurrencyString(inputEl.value); 
                    if (!AppState.budgetData[year][month][category]) AppState.budgetData[year][month][category] = {};
                    if (AppState.budgetData[year][month][category][item] !== numValue) { AppState.budgetData[year][month][category][item] = numValue; saveToDatabase(); renderApp(); } 
                }, 1000);
            },
            handleBlur: (year, month, category, item, inputEl) => { 
                clearTimeout(typingTimer); const numValue = parseCurrencyString(inputEl.value); inputEl.value = formatCurrencyInput(numValue); 
                if (!AppState.budgetData[year][month][category]) AppState.budgetData[year][month][category] = {};
                if (AppState.budgetData[year][month][category][item] !== numValue) { AppState.budgetData[year][month][category][item] = numValue; saveToDatabase(); renderApp(); } 
            },

            // RENDIMENTOS
            handleYieldInputDebounced: (year, month, category, item, inputEl) => {
                const rawDigits = inputEl.value.replace(/\D/g, ''); inputEl.value = rawDigits ? formatCurrencyInput(Number(rawDigits) / 100) : '0,00';
                clearTimeout(typingTimer); typingTimer = setTimeout(() => { 
                    const numValue = parseCurrencyString(inputEl.value); 
                    if (!AppState.budgetData[year][month].itemMetadata[category]) AppState.budgetData[year][month].itemMetadata[category] = {};
                    if (AppState.budgetData[year][month].itemMetadata[category][`${item}_yield`] !== numValue) { AppState.budgetData[year][month].itemMetadata[category][`${item}_yield`] = numValue; saveToDatabase(); renderApp(); } 
                }, 1000);
            },
            handleYieldBlur: (year, month, category, item, inputEl) => { 
                clearTimeout(typingTimer); const numValue = parseCurrencyString(inputEl.value); inputEl.value = formatCurrencyInput(numValue); 
                if (!AppState.budgetData[year][month].itemMetadata[category]) AppState.budgetData[year][month].itemMetadata[category] = {};
                if (AppState.budgetData[year][month].itemMetadata[category][`${item}_yield`] !== numValue) { AppState.budgetData[year][month].itemMetadata[category][`${item}_yield`] = numValue; saveToDatabase(); renderApp(); } 
            },

            handleGoalInput: (id, val, renda) => {
                const numVal = parseInt(val) || 0; const percentEl = document.getElementById(`goal-val-${id}`); if(percentEl) percentEl.innerText = numVal + '%';
                const plannedVal = (numVal / 100) * Number(renda); const planValEl = document.getElementById(`plan-val-${id}`); if(planValEl) planValEl.innerText = formatCurrency(plannedVal);

                if(dashInvestData.length > 0) createPieChart('chart-invest', dashInvestData, dashInvestColors, 'pie'); 
            }, 0);

            return `<div class="space-y-6"><div class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-5 gap-3 md:gap-4">${[ { l: 'Rendimentos', v: totals.renda, c: 'text-emerald-600' }, { l: 'Gastos', v: totals.gastos, c: 'text-rose-600' }, { l: 'Investimento', v: totalPatrimonioAcumulado, c: 'text-blue-600', bg: 'bg-blue-50' }, { l: 'Saldo Mês', v: totals.saldo, c: totals.saldo >= 0 ? 'text-emerald-700' : 'text-rose-700', bg: totals.saldo >= 0 ? 'bg-emerald-50' : 'bg-rose-50' }, { l: 'Acumulado Ano', v: totals.acumulado, c: totals.acumulado >= 0 ? 'text-blue-700' : 'text-rose-700', bg: totals.acumulado >= 0 ? 'bg-blue-50' : 'bg-rose-50' } ].map(card => `<div class="p-3 md:p-4 rounded-2xl shadow-sm border border-slate-100 flex flex-col justify-center ${card.bg || 'bg-white'}"><p class="text-[9px] md:text-[10px] font-bold text-slate-500 uppercase tracking-widest">${card.l}</p><p class="text-base sm:text-lg md:text-xl font-bold truncate mt-1 ${card.c}">${formatCurrency(card.v)}</p></div>`).join('')}</div><div class="bg-white p-4 md:p-6 rounded-2xl shadow-sm border border-slate-200"><h3 class="font-bold text-slate-800 uppercase text-xs md:text-sm tracking-wide mb-6 text-center">Evolução em ${AppState.currentYear}</h3><div class="h-[300px] md:h-[350px] w-full relative"><canvas id="dashboard-bar-chart"></canvas></div></div><div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 md:gap-6">${renderPieChartCard('chart-cat', 'Para onde vai meu dinheiro? (Categorias)', catGastos, COLORS_GERAL, 'pie')}${renderPieChartCard('chart-fixovar', 'Gastos: Fixos vs Variáveis', fixoVar, ['#f43f5e', '#f59e0b'], 'pie')}${renderPieChartCard('chart-income', 'Rendimentos', processChartArr(incomeData), COLORS_INCOME, 'pie')}</div><div class="grid grid-cols-1 md:grid-cols-2 gap-4 md:gap-6">${renderPieChartCard('chart-cc', 'Gastos com Cartão de Crédito', processChartArr(ccData), COLORS_CC, 'pie')}${renderPieChartCard('chart-invest', 'Valor Investido', dashInvestData, dashInvestColors, 'pie')}</div></div>`;
        }

        function renderEditableRowHTML(name, value, type, isIncome, isInvestment, category) {
            const colorClass = isIncome ? 'text-emerald-600 focus:text-emerald-700 focus:bg-emerald-50' : 'text-rose-600 focus:text-rose-700 focus:bg-rose-50';
            const y = AppState.currentYear; const m = AppState.currentMonth;
            const inputId = `input-val-${safeId(category)}-${safeId(name)}`; const nameInputId = `input-name-${safeId(category)}-${safeId(name)}`;
            let selectHTML = '';
            if (isInvestment) {
                const colors = type === 'reserva' ? 'bg-blue-100 text-blue-700' : type === 'fixa' ? 'bg-emerald-100 text-emerald-700' : type === 'cripto' ? 'bg-amber-100 text-amber-700' : 'bg-purple-100 text-purple-700';
                selectHTML = `<select onchange="AppActions.handleTypeChange('${y}', '${m}', '${category}', '${name}', this.value)" class="text-[9px] uppercase font-bold rounded px-1.5 py-1 outline-none cursor-pointer transition-colors ${colors}"><option value="reserva" ${type==='reserva'?'selected':''}>Reserva</option><option value="fixa" ${type==='fixa'?'selected':''}>Fixa</option><option value="variavel" ${type==='variavel'?'selected':''}>Var</option><option value="cripto" ${type==='cripto'?'selected':''}>Cripto</option></select>`;
            } else if (!isIncome) {
                const colors = type === 'fixed' ? 'bg-rose-100 text-rose-700' : 'bg-orange-100 text-orange-700';
                selectHTML = `<select onchange="AppActions.handleTypeChange('${y}', '${m}', '${category}', '${name}', this.value)" class="text-[9px] uppercase font-bold rounded px-1.5 py-1 outline-none cursor-pointer transition-colors ${colors}"><option value="fixed" ${type==='fixed'?'selected':''}>Fixo</option><option value="variable" ${type==='variable'?'selected':''}>Var</option></select>`;
            }
            return `<div class="flex items-center justify-between p-2 bg-white hover:bg-slate-50/80 border border-slate-100 rounded-xl transition-colors group shadow-sm gap-1 flex-wrap sm:flex-nowrap"><input id="${nameInputId}" type="text" value="${name}" onblur="AppActions.renameItem('${y}', '${m}', '${category}', '${name}', this)" class="bg-transparent font-semibold text-slate-700 text-xs outline-none w-full sm:w-auto flex-1 min-w-[100px] mb-1 sm:mb-0" placeholder="Descrição"><div class="flex items-center gap-1 shrink-0 ml-auto">${selectHTML}<input id="${inputId}" type="text" inputmode="numeric" value="${formatCurrencyInput(value)}" oninput="AppActions.handleInputDebounced('${y}', '${m}', '${category}', '${name}', this)" onblur="AppActions.handleBlur('${y}', '${m}', '${category}', '${name}', this)" onkeydown="if(event.key==='Enter')this.blur()" class="w-16 sm:w-20 !pl-1 !pr-1 !py-1 border-transparent bg-transparent hover:bg-white font-bold text-xs text-right outline-none transition-all rounded ${colorClass}"><button onclick="AppActions.deleteItem('${y}', '${m}', '${category}', '${name}')" class="text-rose-400 hover:text-rose-600 p-1 sm:p-0.5 opacity-100 sm:opacity-0 group-hover:opacity-100 transition-opacity"><i data-lucide="x" class="w-3 h-3 sm:w-4 sm:h-4"></i></button></div></div>`;
        }

        // [Omitindo demais funções visuais internas para manter o foco no ajuste solicitado]
        // Renda, Gastos, Planejamento, Investimento e Historico mantidos exatamente como no seu código original.
        // A lógica de renderHeader, renderModal e renderApp também permanecem intocadas.

        function renderRenda() {
            const { totals } = calculateMetrics(); const y = AppState.currentYear; const m = AppState.currentMonth;
            const incomes = AppState.currentData['Renda Familiar'] || {}; const entries = Object.entries(incomes);
            const totalRenda = getCategoryTotal(AppState.currentYear, AppState.currentMonth, 'Renda Familiar');
            const isMonthEmpty = totals.renda === 0 && totals.gastos === 0 && (totals.investimentosMes + totals.reservaMesAtual) === 0;

            let uniqueRendaItemsSet = new Set();
            const yDataRendaFiltro = AppState.budgetData[AppState.currentYear];
            if (yDataRendaFiltro) {
                MONTHS.forEach(mesLoop => {
                    if (yDataRendaFiltro[mesLoop]) {
                        const meta = yDataRendaFiltro[mesLoop].categoriesMetadata || DEFAULT_METADATA;
                        Object.keys(yDataRendaFiltro[mesLoop]).forEach(cat => {
                            if (!['goals', 'itemMetadata', 'categoriesMetadata'].includes(cat) && (meta[cat] === 'income' || cat === 'Renda Familiar')) {
                                Object.entries(yDataRendaFiltro[mesLoop][cat]).forEach(([itemName, val]) => {
                                    if (Number(val) > 0) uniqueRendaItemsSet.add(itemName);
                                });
                            }
                        });
                    }
                });
            }
            const uniqueRendaItems = Array.from(uniqueRendaItemsSet).sort();

            let allowedMonthsRenda = MONTHS.slice(0, AppState.currentMonthIdx + 1);
            const rendaEvolutionData = allowedMonthsRenda.map((mesNome) => {
                let totalMes = 0;
                const yData = AppState.budgetData[AppState.currentYear];
                if (yData && yData[mesNome]) {
                    const meta = yData[mesNome].categoriesMetadata || DEFAULT_METADATA;
                    Object.keys(yData[mesNome]).forEach(cat => {
                        if (!['goals', 'itemMetadata', 'categoriesMetadata'].includes(cat) && (meta[cat] === 'income' || cat === 'Renda Familiar')) {
                            Object.entries(yData[mesNome][cat]).forEach(([itemName, val]) => {
                                if (AppState.rendaFilterItem === 'all' || AppState.rendaFilterItem === itemName) {
                                    totalMes += Number(val) || 0;
                                }
                            });
                        }
                    });
                }
                return { name: mesNome.substring(0, 3), Valor: totalMes };
            });

            setTimeout(() => { 
                if (rendaEvolutionData.length > 0) createEvolucaoRendaChart('chart-renda-evolucao', rendaEvolutionData);
            }, 0);

            let html = '<div class="space-y-6 max-w-4xl mx-auto">';
            if (isMonthEmpty && (AppState.currentMonthIdx > 0 || parseInt(AppState.currentYear) > 2020)) {
                let pMonth = AppState.currentMonthIdx - 1; let pYear = AppState.currentYear;
                if (pMonth < 0) { pMonth = 11; pYear = (parseInt(AppState.currentYear) - 1).toString(); }
                html += `<div class="bg-blue-50 border border-blue-200 rounded-2xl p-4 flex flex-col sm:flex-row items-start sm:items-center justify-between gap-4"><div class="flex items-center gap-3"><div class="p-2 bg-blue-100 rounded-lg shrink-0"><i data-lucide="copy" class="w-5 h-5 text-blue-600"></i></div><div><h4 class="font-bold text-blue-800 text-sm">Puxar dados passados?</h4><p class="text-xs text-blue-600">Copie as contas de ${MONTHS[pMonth]}/${pYear} para agilizar.</p></div></div><button onclick="AppActions.copyFromPreviousMonth('income')" class="w-full sm:w-auto px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white text-xs font-bold rounded-xl shadow-sm transition-colors">Copiar Dados</button></div>`;
            }
            html += `<div class="bg-white rounded-3xl shadow-sm border border-slate-200 p-5 md:p-8"><div class="flex flex-wrap gap-2 justify-between items-center mb-6"><h3 class="font-bold text-slate-800 uppercase text-xs md:text-sm tracking-widest">Minhas Rendas</h3><button onclick="AppActions.addItem('${y}', '${m}', 'Renda Familiar', 'Nova Renda', 'income')" class="bg-blue-500 hover:bg-blue-600 text-white px-3 md:px-4 py-2 rounded-xl text-xs font-bold flex items-center gap-1 shadow-sm transition-colors"><i data-lucide="plus" class="w-3 h-3"></i> Adicionar</button></div><div class="space-y-3 min-h-[120px]">${entries.length === 0 ? '<div class="flex items-center justify-center h-full text-slate-400 italic text-xs md:text-sm py-10">Nenhuma renda cadastrada.</div>' : entries.map(([name, val]) => renderEditableRowHTML(name, val, 'income', true, false, 'Renda Familiar')).join('')}</div><div class="mt-8 pt-6 border-t border-slate-100 flex flex-wrap gap-2 justify-between items-end"><span class="text-[10px] md:text-xs font-bold text-slate-400 uppercase tracking-widest">Total Recebido:</span><span class="text-2xl md:text-3xl font-bold text-emerald-600">${formatCurrency(totalRenda)}</span></div></div>`;
            
            html += `<div class="bg-white p-5 md:p-6 rounded-3xl shadow-sm border border-slate-200 mt-6">
                        <div class="flex flex-col sm:flex-row items-start sm:items-center justify-between mb-6 gap-4 border-b border-slate-100 pb-4">
                            <h3 class="font-extrabold text-slate-800 uppercase text-xs md:text-[13px] tracking-widest flex items-center gap-2"><i data-lucide="bar-chart-2" class="w-4 h-4 text-emerald-600"></i> Evolução da Renda em ${AppState.currentYear}</h3>
                            <div class="flex flex-wrap items-center gap-2 bg-slate-50 p-1.5 rounded-xl border border-slate-200">
                                <i data-lucide="filter" class="w-4 h-4 text-slate-400 ml-1 shrink-0"></i>
                                <select onchange="AppActions.changeRendaFilter(this.value)" class="text-[10px] md:text-xs font-bold text-slate-600 bg-transparent py-1 px-1 outline-none cursor-pointer max-w-[150px] truncate">
                                    <option value="all" ${AppState.rendaFilterItem === 'all' ? 'selected' : ''}>Todas as Rendas</option>
                                    ${uniqueRendaItems.map(a => `<option value="${a}" ${AppState.rendaFilterItem === a ? 'selected' : ''}>${a}</option>`).join('')}
                                </select>
                            </div>
                        </div>
                        <div class="h-[250px] md:h-[300px] w-full relative">
                            <canvas id="chart-renda-evolucao"></canvas>
                        </div>
                    </div>`;

            html += '</div>';
            return html;
        }

        // [Renders renderGastos, renderPlanejamento, renderInvestimento, renderHistorico omitidos para brevidade, mas mantidos iguais ao seu original]

        // --- SISTEMA DE RENDERIZAÇÃO (MAIN) ---
        function renderHeader() {
            const tabs = [ { id: 'dashboard', label: 'Dashboard' }, { id: 'renda', label: 'Renda' }, { id: 'gastos', label: 'Gastos' }, { id: 'planejamento', label: 'Planejamento' }, { id: 'investimento', label: 'Investimentos' }, { id: 'historico', label: 'Reserva e Histórico' } ];
            return `<header class="bg-white border-b border-slate-200 sticky top-0 z-20 shadow-sm"><div class="max-w-7xl mx-auto px-4 py-2 md:py-3"><div class="flex items-center justify-between gap-3 md:gap-4"><div class="flex items-center h-10 md:h-12 relative w-24 sm:w-32 md:w-44 shrink-0"><img src="logo.png" alt="Lumis Logo" class="absolute top-1/2 left-0 -translate-y-1/2 w-full h-auto object-contain max-w-none"></div><div class="flex items-center gap-2 sm:gap-4 shrink-0"><div class="flex items-center text-[10px] sm:text-xs font-medium min-w-[50px] sm:min-w-[80px] justify-end" id="sync-status"></div><div class="relative"><button onclick="document.getElementById('profile-dropdown').classList.toggle('hidden');" class="flex items-center justify-center gap-1 sm:gap-2 px-2 sm:px-4 py-2 bg-slate-100 hover:bg-slate-200 text-slate-700 rounded-xl text-xs md:text-sm font-bold transition-colors"><i data-lucide="user" class="w-4 h-4"></i> <span class="hidden sm:inline">Perfil</span> <i data-lucide="chevron-down" class="w-3 h-3 opacity-50"></i></button><div id="profile-dropdown" class="hidden absolute right-0 top-full mt-2 w-48 bg-white border border-slate-200 rounded-xl shadow-lg z-50 flex-col overflow-hidden origin-top-right"><a href="https://billing.stripe.com/p/login/8x29ATe0PbI8bT00h800000" target="_blank" class="flex items-center gap-2 px-4 py-3 hover:bg-slate-50 text-slate-700 text-sm font-bold border-b border-slate-100 transition-colors"><i data-lucide="credit-card" class="w-4 h-4 text-blue-500"></i> Gerenciar assinatura</a><button onclick="AppActions.sair()" class="flex items-center gap-2 px-4 py-3 hover:bg-rose-50 text-rose-600 text-sm font-bold text-left w-full transition-colors"><i data-lucide="log-out" class="w-4 h-4 text-rose-500"></i> Sair da Conta</button></div></div></div></div></div><div class="border-t border-slate-100 w-full overflow-x-auto scrollbar-hide mt-3 md:mt-0"><div class="max-w-7xl mx-auto px-2 sm:px-4 flex flex-nowrap justify-start lg:justify-center gap-1 sm:gap-4 md:gap-8">${tabs.map(t => `<button onclick="AppActions.changeTab('${t.id}')" class="py-3 px-3 md:px-4 border-b-2 transition-colors whitespace-nowrap text-xs md:text-sm font-bold ${AppState.activeTab === t.id ? 'border-blue-600 text-blue-600' : 'border-transparent text-slate-500 hover:text-slate-700 hover:bg-slate-50'}">${t.label}</button>`).join('')}</div></div></header>`;
        }

        function renderApp() {
            if (AppState.loading) return;
            const root = document.getElementById('app-root');
            destroyCharts();
            let contentHTML = '';
            if(AppState.activeTab === 'dashboard') contentHTML = renderDashboard();
            else if(AppState.activeTab === 'renda') contentHTML = renderRenda();
            // ... (restante dos conteúdos)
            root.innerHTML = `${renderHeader()}<main class="max-w-7xl mx-auto px-4 mt-4 md:mt-6">${contentHTML}</main>`;
            lucide.createIcons();
            updateSyncUI();
        }

        // --- INICIALIZAÇÃO ---
        async function initAuth() {
            try {
                const { data: { user } } = await supabaseClient.auth.getUser();
                if (!user) { AppActions.sair(); return; }
                AppState.user = user;
                const { data: profile, error: profileError } = await supabaseClient.from('profiles').select('subscription_status').eq('id', user.id).single();

                // CORREÇÃO 3: Se não for 'active', redireciona para cadastro.html
                if (profileError || !profile || profile.subscription_status !== 'active') {
                    window.location.href = "cadastro.html"; 
                    return; 
                }
                await loadDatabaseData();
            } catch (error) {
                // CORREÇÃO 4: Em caso de erro de autenticação, volta para login.html
                window.location.href = "login.html";
            }
        }

        initAuth();
    </script>
</body>
</html>
