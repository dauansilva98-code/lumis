<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Senha | Lumis - Organizador Financeiro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap');
        
        body { 
            font-family: 'Inter', sans-serif; 
            overflow-x: hidden;
            overflow-y: auto; 
            background: linear-gradient(135deg, #f0f4f8 0%, #e2e8f0 100%);
        }
        
        .clean-card {
            background: #ffffff;
            border-radius: 2rem;
            box-shadow: 0 20px 40px -15px rgba(0, 0, 0, 0.05), 0 0 20px 0 rgba(255, 255, 255, 0.5) inset;
            border: 1px solid rgba(255, 255, 255, 0.8);
        }

        .blob {
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(0, 64, 161, 0.08) 0%, rgba(255, 255, 255, 0) 70%);
            border-radius: 50%;
            z-index: -1;
            animation: move 25s infinite alternate ease-in-out;
        }

        @keyframes move {
            from { transform: translate(-10%, -10%) scale(1); }
            to { transform: translate(15%, 15%) scale(1.1); }
        }

        .toast-enter {
            transform: translateY(100%);
            opacity: 0;
        }
        .toast-enter-active {
            transform: translateY(0);
            opacity: 1;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .toast-leave {
            transform: translateY(0);
            opacity: 1;
        }
        .toast-leave-active {
            transform: translateY(-100%);
            opacity: 0;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
    </style>
</head>
<body class="min-h-[100dvh] w-full flex items-center justify-center p-4 sm:p-6 relative">
    
    <div id="toast-container" class="fixed top-6 right-6 z-50 flex flex-col gap-3"></div>

    <div class="blob top-0 left-0 fixed"></div>
    <div class="blob bottom-0 right-0 fixed" style="animation-direction: alternate-reverse; animation-duration: 30s;"></div>

    <main class="w-full max-w-[420px] m-auto z-10 flex flex-col items-center justify-center py-6 sm:py-8">

        <div class="w-full text-center mb-6 sm:mb-8 flex flex-col items-center justify-center">
            <img src="logo.png" alt="Lumis Logo" class="w-48 sm:w-56 h-auto object-contain mx-auto">
            <h2 class="w-full text-center text-[12px] sm:text-[13px] font-extrabold text-[#0040A1] uppercase tracking-[0.2em] relative z-10 mt-2 sm:mt-3">
                Organizador Financeiro
            </h2>
        </div>

        <div class="clean-card w-full p-6 sm:p-10">
            
            <div class="text-center mb-6 sm:mb-8 flex flex-col items-center justify-center">
                <div class="w-12 h-12 bg-blue-50 text-[#0040A1] rounded-2xl flex items-center justify-center mb-4 border border-blue-100">
                    <i data-lucide="key" class="w-6 h-6"></i>
                </div>
                <h3 class="text-xl sm:text-2xl font-extrabold text-slate-800 mb-2">Esqueceu a senha?</h3>
                <p class="text-[13px] sm:text-sm text-slate-500 font-medium">Digite o seu e-mail cadastrado e enviaremos um link seguro para você redefinir sua senha.</p>
            </div>

            <div class="space-y-5 sm:space-y-6 w-full text-left">
                
                <div class="input-group w-full">
                    <label for="email" class="block text-left text-[11px] font-extrabold uppercase tracking-wider text-[#64748b] mb-2">E-mail cadastrado</label>
                    <div class="relative group w-full">
                        <span class="absolute inset-y-0 left-0 pl-4 flex items-center text-slate-400 group-focus-within:text-[#0040A1] transition-colors">
                            <i data-lucide="mail" class="w-5 h-5"></i>
                        </span>
                        <input type="email" id="email" 
                            class="block w-full pl-12 pr-4 py-3.5 bg-white border-2 border-slate-100 rounded-2xl text-sm font-medium text-slate-800 focus:outline-none focus:ring-0 focus:border-[#0040A1] transition-colors placeholder:text-slate-300 placeholder:font-normal" 
                            placeholder="exemplo@email.com">
                    </div>
                </div>

                <button onclick="recuperarSenha()" id="btnRecuperar" class="w-full py-3.5 sm:py-4 mt-2 bg-gradient-to-b from-[#060A1F] to-[#0040A1] text-white rounded-2xl font-bold text-[14px] sm:text-[15px] shadow-lg shadow-[#0040A1]/30 hover:to-[#003080] hover:from-[#040714] hover:-translate-y-0.5 active:scale-95 transition-all flex items-center justify-center gap-3 group">
                    <span>Enviar Link de Recuperação</span>
                    <i data-lucide="send" class="w-4 h-4 group-hover:translate-x-1 transition-transform"></i>
                </button>
            </div>
        </div>
        
        <div class="mt-6 sm:mt-8 w-full text-center text-[12px] sm:text-[13px] text-slate-600">
            <span>Lembrou a senha?</span>
            <br>
            <a href="login.html" class="text-[#0040A1] font-bold mt-1 inline-block hover:underline transition-all">
                Voltar para o Login ➔
            </a>
        </div>

        <div class="mt-8 sm:mt-10 w-full text-center">
            <p class="text-[#64748b] text-[9px] sm:text-[10px] uppercase tracking-[0.2em] font-extrabold">
                © 2026 Lumis
            </p>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
      lucide.createIcons();

      // CORREÇÃO DE SEGURANÇA: Se o usuário já estiver logado, não tem porque ele ver a tela de recuperar senha.
      // Mandamos ele direto para o painel.html
      if (localStorage.getItem("logado") === "sim") {
        window.location.href = "painel.html";
      }

      const SUPABASE_URL = 'https://izmdjkalwgupuehrbcxm.supabase.co';
      const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml6bWRqa2Fsd2d1cHVlaHJiY3htIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzAyNDkwNTUsImV4cCI6MjA4NTgyNTA1NX0.w3FW5oORqiEjT0Xj3d3777KfE0xl2zm0ogezpfN3Gss'; 

      let supabaseClient = null;
      if (SUPABASE_KEY) {
          supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
      }

      function showToast(message, type = 'error') {
          const container = document.getElementById('toast-container');
          const toast = document.createElement('div');
          
          const bgColors = {
              error: 'bg-red-500',
              success: 'bg-emerald-500',
              warning: 'bg-amber-500'
          };
          
          const icons = {
              error: 'alert-circle',
              success: 'check-circle',
              warning: 'alert-triangle'
          };

          toast.className = `${bgColors[type]} text-white px-5 py-3.5 rounded-xl shadow-xl flex items-center gap-3 font-medium text-sm toast-enter w-max max-w-sm ml-auto`;
          toast.innerHTML = `
            <i data-lucide="${icons[type]}" class="w-5 h-5 flex-shrink-0"></i> 
            <span>${message}</span>
          `;
          
          container.appendChild(toast);
          lucide.createIcons();

          requestAnimationFrame(() => {
              toast.classList.remove('toast-enter');
              toast.classList.add('toast-enter-active');
          });

          setTimeout(() => {
              toast.classList.remove('toast-enter-active');
              toast.classList.add('toast-leave-active');
              setTimeout(() => {
                  toast.remove();
              }, 300);
          }, 4000);
      }

      async function recuperarSenha() {
        if (!SUPABASE_KEY) {
            showToast("Configurações do banco de dados ausentes.", "error");
            return;
        }

        const email = document.getElementById('email').value.trim();
        const btn = document.getElementById('btnRecuperar');

        if (!email) {
            showToast("Por favor, digite o e-mail da sua conta.", "warning");
            return;
        }

        const originalContent = btn.innerHTML;
        btn.innerHTML = `<svg class="animate-spin h-5 w-5 text-white" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> <span>Enviando...</span>`;
        btn.disabled = true;
        btn.classList.add('opacity-90', 'cursor-not-allowed');

        try {
            // O Supabase enviará um email com um link seguro. 
            const { data, error } = await supabaseClient.auth.resetPasswordForEmail(email, {
                redirectTo: window.location.origin + '/nova-senha.html', 
            });
            
            if (error) {
                showToast(error.message, "error");
                restaurarBotao();
                return;
            }

            showToast("Pronto! Verifique sua caixa de entrada (ou spam).", "success");
            document.getElementById('email').value = ''; // Limpa o campo

        } catch (err) {
            console.error(err);
            showToast("Erro ao tentar enviar. Verifique sua internet.", "error");
        } finally {
            restaurarBotao();
        }

        function restaurarBotao() {
            btn.innerHTML = originalContent;
            btn.disabled = false;
            btn.classList.remove('opacity-90', 'cursor-not-allowed');
            lucide.createIcons();
        }
      }

      document.addEventListener('keypress', (e) => { 
          if (e.key === 'Enter') recuperarSenha(); 
      });
    </script>
</body>
</html>
