<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin CRM | Lumis</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .table-row:hover { background-color: #f1f5f9; }
    </style>
</head>
<body class="min-h-screen hidden" id="adminBody">

    <header class="bg-[#0D152B] text-white py-4 px-4 sm:px-6 shadow-md flex justify-between items-center border-b border-white/10">
        <div class="flex items-center gap-3">
            <img src="logo.png" alt="Lumis Logo" class="h-7 sm:h-9 object-contain" onerror="this.style.display='none';">
            <span class="text-[11px] sm:text-sm font-bold text-blue-400 uppercase tracking-widest border-l border-slate-700 pl-3 ml-1 hidden sm:inline-block">CRM Gestão</span>
        </div>
        <div class="flex items-center gap-3 sm:gap-4">
            <span id="adminName" class="text-xs sm:text-sm text-slate-300 font-medium hidden md:inline-block"></span>
            
            <button onclick="window.location.href='painel.html'" class="text-xs sm:text-sm bg-[#2563EB] hover:bg-[#1D4ED8] text-white px-3 sm:px-4 py-2 rounded-lg font-bold transition-all shadow-[0_0_15px_rgba(37,99,235,0.3)] flex items-center gap-2">
                <i data-lucide="layout-dashboard" class="w-4 h-4"></i> <span class="hidden sm:inline">Painel</span>
            </button>
            
            <button onclick="sair()" class="text-xs sm:text-sm bg-white/10 hover:bg-white/20 px-3 sm:px-4 py-2 rounded-lg transition-colors border border-white/10 flex items-center gap-2">
                <i data-lucide="log-out" class="w-4 h-4"></i> <span class="hidden sm:inline">Sair</span>
            </button>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 py-8">
        
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 sm:gap-6 mb-6">
            <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-100">
                <p class="text-[11px] sm:text-sm text-slate-500 font-bold uppercase tracking-wider mb-1">Total Clientes</p>
                <h3 id="totalClientes" class="text-2xl sm:text-3xl font-extrabold text-slate-800">0</h3>
            </div>
            <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-100">
                <p class="text-[11px] sm:text-sm text-emerald-600 font-bold uppercase tracking-wider mb-1">Ativos</p>
                <h3 id="clientesAtivos" class="text-2xl sm:text-3xl font-extrabold text-emerald-600">0</h3>
            </div>
            <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-100">
                <p class="text-[11px] sm:text-sm text-red-500 font-bold uppercase tracking-wider mb-1">Inativos</p>
                <h3 id="clientesInativos" class="text-2xl sm:text-3xl font-extrabold text-red-500">0</h3>
            </div>
            <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-100">
                <p class="text-[11px] sm:text-sm text-amber-500 font-bold uppercase tracking-wider mb-1">Pendentes</p>
                <h3 id="clientesPendentes" class="text-2xl sm:text-3xl font-extrabold text-amber-500">0</h3>
            </div>
        </div>

        <div class="bg-white p-4 sm:p-5 rounded-2xl shadow-sm border border-slate-100 mb-6 flex flex-col md:flex-row gap-4 items-end">
            
            <div class="w-full md:w-[35%]">
                <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-1.5">Buscar (Nome, E-mail ou Fone)</label>
                <div class="relative">
                    <i data-lucide="search" class="w-4 h-4 absolute left-3 top-1/2 -translate-y-1/2 text-slate-400"></i>
                    <input type="text" id="filtroBusca" onkeyup="filtrarClientes()" placeholder="Digite para buscar..." class="w-full pl-9 pr-3 py-2.5 bg-slate-50 border border-slate-200 rounded-xl text-sm font-medium focus:outline-none focus:border-[#2563EB] focus:ring-1 focus:ring-[#2563EB] transition-all">
                </div>
            </div>

            <div class="w-full md:w-[20%]">
                <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-1.5">Status</label>
                <select id="filtroStatus" onchange="filtrarClientes()" class="w-full px-3 py-2.5 bg-slate-50 border border-slate-200 rounded-xl text-sm font-medium focus:outline-none focus:border-[#2563EB] focus:ring-1 focus:ring-[#2563EB] cursor-pointer transition-all">
                    <option value="todos">Todos os status</option>
                    <option value="active">🟢 Ativos</option>
                    <option value="inativo">🔴 Inativos</option>
                    <option value="pendente">🟡 Pendentes</option>
                </select>
            </div>

            <div class="w-full md:w-[20%]">
                <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-1.5">Data Cadastro (De)</label>
                <input type="date" id="filtroDataInicio" onchange="filtrarClientes()" class="w-full px-3 py-2.5 bg-slate-50 border border-slate-200 rounded-xl text-sm font-medium text-slate-600 focus:outline-none focus:border-[#2563EB]">
            </div>

            <div class="w-full md:w-[20%]">
                <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-1.5">Data Cadastro (Até)</label>
                <input type="date" id="filtroDataFim" onchange="filtrarClientes()" class="w-full px-3 py-2.5 bg-slate-50 border border-slate-200 rounded-xl text-sm font-medium text-slate-600 focus:outline-none focus:border-[#2563EB]">
            </div>
            
            <div class="w-full md:w-[5%] flex justify-end">
                <button onclick="limparFiltros()" title="Limpar Filtros" class="p-2.5 bg-slate-100 hover:bg-slate-200 text-slate-600 rounded-xl transition-colors">
                    <i data-lucide="x-circle" class="w-5 h-5"></i>
                </button>
            </div>

        </div>

        <div class="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden">
            <div class="px-6 py-5 border-b border-slate-100 flex justify-between items-center bg-slate-50/50">
                <h2 class="text-base sm:text-lg font-bold text-slate-800">Banco de Clientes</h2>
                
                <div class="flex items-center gap-2">
                    <button onclick="exportarCSV()" class="text-emerald-600 hover:text-emerald-700 flex items-center gap-2 text-xs sm:text-sm font-bold bg-emerald-50 hover:bg-emerald-100 px-3 py-1.5 rounded-lg transition-colors">
                        <i data-lucide="download" class="w-4 h-4"></i> <span class="hidden sm:inline">Baixar Planilha</span>
                    </button>
                    <button onclick="carregarClientes()" class="text-[#2563EB] hover:text-[#1D4ED8] flex items-center gap-2 text-xs sm:text-sm font-bold bg-blue-50 hover:bg-blue-100 px-3 py-1.5 rounded-lg transition-colors">
                        <i data-lucide="refresh-cw" class="w-4 h-4"></i> <span class="hidden sm:inline">Sincronizar</span>
                    </button>
                </div>
            </div>
            
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse min-w-[800px]">
                    <thead>
                        <tr class="bg-slate-50 text-slate-400 text-[10px] sm:text-[11px] uppercase tracking-wider border-b border-slate-100">
                            <th class="px-6 py-4 font-bold">Cliente</th>
                            <th class="px-6 py-4 font-bold">Telefone</th>
                            <th class="px-6 py-4 font-bold">Data de Cadastro</th>
                            <th class="px-6 py-4 font-bold">Último Pgto</th>
                            <th class="px-6 py-4 font-bold">Status</th>
                            <th class="px-6 py-4 font-bold text-center">Ação</th>
                        </tr>
                    </thead>
                    <tbody id="tabelaClientes" class="text-sm divide-y divide-slate-50">
                        <tr>
                            <td colspan="6" class="px-6 py-10 text-center text-slate-500">
                                <i data-lucide="loader-2" class="w-8 h-8 animate-spin mx-auto mb-3 text-[#2563EB]"></i>
                                Carregando banco de dados...
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <div class="px-6 py-4 border-t border-slate-100 flex items-center justify-between bg-slate-50/50">
                <span id="textoPaginacao" class="text-xs font-medium text-slate-500">Aguardando dados...</span>
                <div class="flex gap-2">
                    <button id="btnAnterior" onclick="mudarPagina(-1)" disabled class="px-3 py-1.5 bg-white border border-slate-200 rounded-lg text-xs font-bold text-slate-600 hover:bg-slate-50 disabled:opacity-50 disabled:cursor-not-allowed transition-colors flex items-center gap-1">
                        <i data-lucide="chevron-left" class="w-4 h-4"></i> Anterior
                    </button>
                    <button id="btnProxima" onclick="mudarPagina(1)" disabled class="px-3 py-1.5 bg-white border border-slate-200 rounded-lg text-xs font-bold text-slate-600 hover:bg-slate-50 disabled:opacity-50 disabled:cursor-not-allowed transition-colors flex items-center gap-1">
                        Próxima <i data-lucide="chevron-right" class="w-4 h-4"></i>
                    </button>
                </div>
            </div>

        </div>

    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        lucide.createIcons();

        // Conexão com Supabase
        const SUPABASE_URL = 'https://izmdjkalwgupuehrbcxm.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml6bWRqa2Fsd2d1cHVlaHJiY3htIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzAyNDkwNTUsImV4cCI6MjA4NTgyNTA1NX0.w3FW5oORqiEjT0Xj3d3777KfE0xl2zm0ogezpfN3Gss'; 
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // 🔒 TRAVA DE SEGURANÇA
        const EMAILS_ADMIN = ['dauan.silva98@gmail.com'];

        // Variáveis Globais (Para Filtros, Paginação e Exportação)
        let todosOsClientes = []; 
        let clientesFiltradosGlobais = []; 
        let paginaAtual = 1;
        const itensPorPagina = 10;

        async function verificarAcesso() {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (!session) { window.location.href = 'login.html'; return; }

            const userEmail = session.user.email;
            if (!EMAILS_ADMIN.includes(userEmail)) {
                window.location.href = 'painel.html';
            } else {
                document.getElementById('adminBody').classList.remove('hidden');
                document.getElementById('adminName').innerText = userEmail;
                carregarClientes();
            }
        }

        async function carregarClientes() {
            try {
                // Estado de carregamento
                document.getElementById('tabelaClientes').innerHTML = `<tr><td colspan="6" class="px-6 py-10 text-center text-slate-500"><i data-lucide="loader-2" class="w-8 h-8 animate-spin mx-auto mb-3 text-[#2563EB]"></i>Sincronizando...</td></tr>`;
                lucide.createIcons();

                const { data: clientes, error } = await supabaseClient
                    .from('profiles')
                    .select('*')
                    .order('created_at', { ascending: false });

                if (error) throw error;
                
                todosOsClientes = clientes || [];
                filtrarClientes(); // Renderiza a tabela aplicando filtros e paginação inicial

            } catch (error) {
                console.error("Erro ao buscar clientes:", error);
                document.getElementById('tabelaClientes').innerHTML = `<tr><td colspan="6" class="px-6 py-8 text-center text-red-500 font-medium bg-red-50/50">Erro ao carregar dados. (Verifique as permissões do banco).</td></tr>`;
            }
        }

        // ==========================================
        // NOVA FUNÇÃO: EXTRAIR NOME LIMPO
        // ==========================================
        function extrairNomeDoEmail(email) {
            if (!email) return 'Sem nome';
            
            // Pega só o que vem antes do @
            let parteLocal = email.split('@')[0];
            
            // 1. Remove todos os números
            parteLocal = parteLocal.replace(/\d+/g, '');
            
            // 2. Troca pontos, hifens e underlines por espaço
            parteLocal = parteLocal.replace(/[.\-_]/g, ' ');
            
            // 3. Tira espaços duplos que possam sobrar e apara as pontas
            parteLocal = parteLocal.replace(/\s+/g, ' ').trim();
            
            // 4. Capitaliza a primeira letra de cada palavra
            const palavras = parteLocal.split(' ');
            const nomeFormatado = palavras.map(palavra => {
                if (palavra.length > 0) {
                    return palavra.charAt(0).toUpperCase() + palavra.slice(1).toLowerCase();
                }
                return '';
            }).join(' ');
            
            return nomeFormatado || 'Cliente'; // Se o email era só número, fica "Cliente"
        }

        function filtrarClientes() {
            // Pega os valores digitados nos filtros
            const termoBusca = document.getElementById('filtroBusca').value.toLowerCase();
            const statusFiltro = document.getElementById('filtroStatus').value;
            const dataInicio = document.getElementById('filtroDataInicio').value;
            const dataFim = document.getElementById('filtroDataFim').value;

            // Filtra o array principal
            clientesFiltradosGlobais = todosOsClientes.filter(cliente => {
                
                // 1. Filtro de Texto (inclui o nome extraído do email na busca)
                const nomeExibicao = cliente.full_name || extrairNomeDoEmail(cliente.email);
                const textoCliente = `${nomeExibicao} ${cliente.email || ''} ${cliente.telefone || ''}`.toLowerCase();
                const passaTexto = textoCliente.includes(termoBusca);

                // 2. Filtro de Status
                let passaStatus = true;
                if (statusFiltro !== 'todos') {
                    const statusReal = cliente.subscription_status;
                    if (statusFiltro === 'active') {
                        passaStatus = (statusReal === 'active');
                    } else if (statusFiltro === 'inativo') {
                        passaStatus = (statusReal === 'canceled' || statusReal === 'past_due');
                    } else if (statusFiltro === 'pendente') {
                        passaStatus = (statusReal !== 'active' && statusReal !== 'canceled' && statusReal !== 'past_due');
                    }
                }

                // 3. Filtro de Datas
                let passaData = true;
                if (dataInicio || dataFim) {
                    const dataCadastro = new Date(cliente.created_at);
                    if (dataInicio) {
                        const inicio = new Date(dataInicio + 'T00:00:00');
                        if (dataCadastro < inicio) passaData = false;
                    }
                    if (dataFim) {
                        const fim = new Date(dataFim + 'T23:59:59');
                        if (dataCadastro > fim) passaData = false;
                    }
                }

                return passaTexto && passaStatus && passaData;
            });

            // Sempre que filtrar, volta para a página 1
            paginaAtual = 1; 

            // Atualiza os Números dos Cards Superiores
            let contAtivos = 0, contInativos = 0, contPendentes = 0;
            clientesFiltradosGlobais.forEach(cliente => {
                if (cliente.subscription_status === 'active') contAtivos++;
                else if (cliente.subscription_status === 'canceled' || cliente.subscription_status === 'past_due') contInativos++;
                else contPendentes++;
            });
            document.getElementById('totalClientes').innerText = clientesFiltradosGlobais.length;
            document.getElementById('clientesAtivos').innerText = contAtivos;
            document.getElementById('clientesInativos').innerText = contInativos;
            document.getElementById('clientesPendentes').innerText = contPendentes;

            // Renderiza a tabela paginada
            renderizarTabelaPaginada();
        }

        function renderizarTabelaPaginada() {
            const tbody = document.getElementById('tabelaClientes');
            tbody.innerHTML = ''; 

            const totalFiltrados = clientesFiltradosGlobais.length;

            if (totalFiltrados === 0) {
                tbody.innerHTML = `<tr><td colspan="6" class="px-6 py-12 text-center text-slate-500 bg-slate-50/30 rounded-xl"><i data-lucide="search-x" class="w-8 h-8 text-slate-300 mx-auto mb-3"></i>Nenhum cliente atende a esses filtros.</td></tr>`;
                atualizarBotoesPaginacao(0, 0);
                lucide.createIcons();
                return;
            }

            // Calcula o corte (Fatia) do Array para a página atual
            const inicioIndice = (paginaAtual - 1) * itensPorPagina;
            const fimIndice = inicioIndice + itensPorPagina;
            const clientesNaTela = clientesFiltradosGlobais.slice(inicioIndice, fimIndice);

            clientesNaTela.forEach(cliente => {
                // Datas
                const dataCadastro = new Date(cliente.created_at).toLocaleDateString('pt-BR');
                const ultimoPagamento = cliente.updated_at ? new Date(cliente.updated_at).toLocaleDateString('pt-BR') : '—';
                
                // Badges de Status
                let statusBadge = '';
                if (cliente.subscription_status === 'active') {
                    statusBadge = `<span class="bg-emerald-100 text-emerald-700 px-2.5 py-1 rounded-md text-[11px] font-bold flex items-center gap-1.5 w-max border border-emerald-200"><div class="w-1.5 h-1.5 rounded-full bg-emerald-500 animate-pulse"></div> Ativo</span>`;
                } else if (cliente.subscription_status === 'canceled' || cliente.subscription_status === 'past_due') {
                    statusBadge = `<span class="bg-red-50 text-red-600 px-2.5 py-1 rounded-md text-[11px] font-bold flex items-center gap-1.5 w-max border border-red-100"><div class="w-1.5 h-1.5 rounded-full bg-red-500"></div> Inativo</span>`;
                } else {
                    statusBadge = `<span class="bg-amber-50 text-amber-600 px-2.5 py-1 rounded-md text-[11px] font-bold flex items-center gap-1.5 w-max border border-amber-100"><div class="w-1.5 h-1.5 rounded-full bg-amber-500"></div> Pendente</span>`;
                }

                // Botão WhatsApp e Nome Formatado
                const nomeExibicao = cliente.full_name || extrairNomeDoEmail(cliente.email);

                let btnWhats = `<span class="text-slate-300 text-[11px] bg-slate-50 px-2 py-1 rounded">Sem Nº</span>`;
                if (cliente.telefone) { 
                    const numLimpo = cliente.telefone.replace(/\D/g, ''); 
                    btnWhats = `
                        <a href="https://wa.me/55${numLimpo}?text=Olá%20${nomeExibicao},%20aqui%20é%20da%20equipe%20Lumis!" 
                           target="_blank" 
                           class="bg-[#25D366] hover:bg-[#1ebd5a] text-white px-3 py-2 rounded-lg text-[11px] font-bold transition-all flex items-center justify-center gap-1.5 mx-auto w-max shadow-sm shadow-[#25D366]/30">
                            <i data-lucide="message-circle" class="w-3.5 h-3.5"></i> Chamar
                        </a>
                    `;
                }

                // Monta a Linha
                const tr = document.createElement('tr');
                tr.className = 'table-row transition-colors hover:bg-blue-50/30';
                tr.innerHTML = `
                    <td class="px-6 py-4">
                        <p class="font-bold text-slate-800 text-[13px] mb-0.5">${nomeExibicao}</p>
                        <p class="text-[11px] text-slate-500 font-medium">${cliente.email || '—'}</p>
                    </td>
                    <td class="px-6 py-4 text-slate-600 text-[13px] font-medium tracking-wide">${cliente.telefone || '—'}</td>
                    <td class="px-6 py-4 text-slate-500 text-[13px]">${dataCadastro}</td>
                    <td class="px-6 py-4 text-slate-500 text-[13px]">${ultimoPagamento}</td>
                    <td class="px-6 py-4">${statusBadge}</td>
                    <td class="px-6 py-4">${btnWhats}</td>
                `;
                tbody.appendChild(tr);
            });

            atualizarBotoesPaginacao(inicioIndice, clientesNaTela.length);
            lucide.createIcons();
        }

        function atualizarBotoesPaginacao(inicioIndice, qtdNaTela) {
            const total = clientesFiltradosGlobais.length;
            const maxPaginas = Math.ceil(total / itensPorPagina);
            
            // Texto: Mostrando 1 a 10 de 50 clientes
            if (total === 0) {
                document.getElementById('textoPaginacao').innerText = "Nenhum cliente encontrado.";
            } else {
                document.getElementById('textoPaginacao').innerText = `Mostrando ${inicioIndice + 1} a ${inicioIndice + qtdNaTela} de ${total} clientes (Página ${paginaAtual}/${maxPaginas})`;
            }

            // Habilita/Desabilita os botões
            document.getElementById('btnAnterior').disabled = (paginaAtual === 1);
            document.getElementById('btnProxima').disabled = (paginaAtual === maxPaginas || maxPaginas === 0);
        }

        function mudarPagina(direcao) {
            paginaAtual += direcao;
            renderizarTabelaPaginada();
        }

        function limparFiltros() {
            document.getElementById('filtroBusca').value = '';
            document.getElementById('filtroStatus').value = 'todos';
            document.getElementById('filtroDataInicio').value = '';
            document.getElementById('filtroDataFim').value = '';
            filtrarClientes(); // Roda a tabela de novo com tudo limpo
        }

        // FUNÇÃO DE EXPORTAR EXCEL (CSV)
        function exportarCSV() {
            if (clientesFiltradosGlobais.length === 0) {
                alert("Não há dados para exportar com os filtros atuais.");
                return;
            }

            // Cabeçalho da Planilha
            let csv = "Nome,Email,Telefone,Data Cadastro,Ultimo Pgto,Status\n";

            clientesFiltradosGlobais.forEach(c => {
                const nomeExibicao = c.full_name || extrairNomeDoEmail(c.email);
                const nome = nomeExibicao.replace(/,/g, ''); // Remove vírgulas para não bugar o CSV
                const email = c.email || '';
                const tel = c.telefone || '';
                const dataCad = new Date(c.created_at).toLocaleDateString('pt-BR');
                const ultPgto = c.updated_at ? new Date(c.updated_at).toLocaleDateString('pt-BR') : '';
                
                let status = 'Pendente';
                if (c.subscription_status === 'active') status = 'Ativo';
                else if (c.subscription_status === 'canceled' || c.subscription_status === 'past_due') status = 'Inativo';

                csv += `${nome},${email},${tel},${dataCad},${ultPgto},${status}\n`;
            });

            // Cria o arquivo virtual e clica para baixar
            const blob = new Blob(["\uFEFF" + csv], { type: 'text/csv;charset=utf-8;' }); // \uFEFF força o Excel a ler os acentos corretos
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.download = 'Clientes_Lumis.csv';
            link.click();
            URL.revokeObjectURL(url);
        }

        async function sair() {
            await supabaseClient.auth.signOut();
            window.location.href = 'login.html';
        }

        // Dá o Play na Segurança e Carregamento
        verificarAcesso();
    </script>
</body>
</html>
