<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assinar Premium | Lumis - Organizador Financeiro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap');
        
        body { 
            font-family: 'Inter', sans-serif; 
            overflow-x: hidden;
            overflow-y: auto; 
            background: linear-gradient(135deg, #f0f4f8 0%, #e2e8f0 100%);
        }
        
        .clean-card {
            background: #ffffff;
            border-radius: 2rem;
            box-shadow: 0 20px 40px -15px rgba(0, 0, 0, 0.05), 0 0 20px 0 rgba(255, 255, 255, 0.5) inset;
            border: 1px solid rgba(255, 255, 255, 0.8);
        }

        .blob {
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(0, 64, 161, 0.08) 0%, rgba(255, 255, 255, 0) 70%);
            border-radius: 50%;
            z-index: -1;
            animation: move 25s infinite alternate ease-in-out;
        }

        @keyframes move {
            from { transform: translate(-10%, -10%) scale(1); }
            to { transform: translate(15%, 15%) scale(1.1); }
        }

        .toast-enter {
            transform: translateY(100%);
            opacity: 0;
        }
        .toast-enter-active {
            transform: translateY(0);
            opacity: 1;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .toast-leave {
            transform: translateY(0);
            opacity: 1;
        }
        .toast-leave-active {
            transform: translateY(-100%);
            opacity: 0;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
    </style>
</head>
<body class="min-h-[100dvh] w-full flex flex-col p-4 sm:p-6 relative">
    
    <div id="toast-container" class="fixed top-6 right-6 z-50 flex flex-col gap-3"></div>

    <div class="blob top-0 left-0 fixed"></div>
    <div class="blob bottom-0 right-0 fixed" style="animation-direction: alternate-reverse; animation-duration: 30s;"></div>

    <main class="relative z-10 w-full max-w-[420px] m-auto flex flex-col items-center justify-center py-6 sm:py-8">

        <div class="clean-card w-full p-6 sm:p-10">
            
            <div class="text-center mb-6 sm:mb-8 flex flex-col items-center justify-center">
                <img src="logo.png" alt="Lumis Logo" class="w-40 sm:w-48 h-auto object-contain mx-auto mb-1">
                <h2 class="w-full text-center text-[11px] sm:text-[12px] font-extrabold text-[#0040A1] uppercase tracking-[0.2em] mb-6">
                    Organizador Financeiro
                </h2>
                <h3 id="titulo-pagina" class="text-xl sm:text-2xl font-extrabold text-slate-800 mb-2">Crie sua conta Premium</h3>
                <p id="plano-selecionado-texto" class="text-[13px] sm:text-sm text-slate-500 font-medium">Excelente escolha! <b>Plano Anual</b> com desconto.</p>
            </div>

            <div class="flex gap-3 sm:gap-4 mb-8 w-full">
                <button type="button" id="btn-plano-mensal" onclick="selecionarPlano('mensal')" class="flex-1 relative p-3 sm:p-4 rounded-2xl border-2 transition-all cursor-pointer border-slate-100 bg-white opacity-60 hover:border-slate-300">
                    <div class="flex flex-col items-center justify-center h-full pointer-events-none">
                        <span class="text-xs sm:text-sm font-extrabold text-slate-800 uppercase tracking-wider mb-1">Mensal</span>
                        <span class="text-[10px] sm:text-xs text-slate-400 line-through font-medium leading-none mb-1">de R$ 19,90</span>
                        <span class="text-xl sm:text-2xl font-black text-[#0040A1] leading-none">R$ 9,90</span>
                    </div>
                </button>
                
                <button type="button" id="btn-plano-anual" onclick="selecionarPlano('anual')" class="flex-1 relative p-3 sm:p-4 rounded-2xl border-2 transition-all cursor-pointer border-[#0040A1] bg-blue-50/50 ring-2 ring-[#0040A1]/20 scale-[1.02] shadow-md opacity-100">
                    <div class="flex flex-col items-center justify-center h-full pointer-events-none">
                        <span class="text-xs sm:text-sm font-extrabold text-slate-800 uppercase tracking-wider mb-1">Anual</span>
                        <span class="text-[10px] sm:text-xs text-slate-400 line-through font-medium leading-none mb-1">de R$ 190,90</span>
                        <span class="text-xl sm:text-2xl font-black text-[#0040A1] leading-none">R$ 99,90</span>
                        <span class="text-[9px] sm:text-[10px] font-bold text-emerald-600 mt-1.5 leading-none bg-emerald-50 px-2 py-1 rounded-md border border-emerald-100">R$ 8,33 / mês</span>
                    </div>
                </button>
            </div>

            <div id="formulario-cadastro" class="space-y-5 sm:space-y-6 w-full text-left">
                
                <div class="input-group w-full">
                    <label for="email" class="block text-left text-[11px] font-extrabold uppercase tracking-wider text-[#64748b] mb-2">O seu melhor E-mail</label>
                    <div class="relative group w-full">
                        <span class="absolute inset-y-0 left-0 pl-4 flex items-center text-slate-400 group-focus-within:text-[#0040A1] transition-colors">
                            <i data-lucide="mail" class="w-5 h-5"></i>
                        </span>
                        <input type="email" id="email" 
                            class="block w-full pl-12 pr-4 py-3.5 bg-white border-2 border-slate-100 rounded-2xl text-sm font-medium text-slate-800 focus:outline-none focus:ring-0 focus:border-[#0040A1] transition-colors placeholder:text-slate-300 placeholder:font-normal" 
                            placeholder="exemplo@email.com">
                    </div>
                </div>

                <div class="input-group w-full">
                    <label for="senha" class="block text-left text-[11px] font-extrabold uppercase tracking-wider text-[#64748b] mb-2">Crie uma Senha</label>
                    <div class="relative group w-full">
                        <span class="absolute inset-y-0 left-0 pl-4 flex items-center text-slate-400 group-focus-within:text-[#0040A1] transition-colors">
                            <i data-lucide="lock" class="w-5 h-5"></i>
                        </span>
                        
                        <input type="password" id="senha" oninput="checarSenhas()"
                            class="block w-full pl-12 pr-12 py-3.5 bg-white border-2 border-slate-100 rounded-2xl text-sm font-medium text-slate-800 focus:outline-none focus:ring-0 focus:border-[#0040A1] transition-colors placeholder:text-slate-300 placeholder:font-normal" 
                            placeholder="••••••••">
                            
                        <button type="button" onclick="togglePassword('senha', 'eyeIcon')" class="absolute inset-y-0 right-0 pr-4 flex items-center text-slate-400 hover:text-[#0040A1] cursor-pointer focus:outline-none transition-colors">
                            <svg id="eyeIcon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/>
                                <circle cx="12" cy="12" r="3"/>
                            </svg>
                        </button>
                    </div>
                </div>

                <div class="input-group w-full">
                    <label for="senha_confirmacao" class="block text-left text-[11px] font-extrabold uppercase tracking-wider text-[#64748b] mb-2">Confirme a Senha</label>
                    <div class="relative group w-full">
                        <span class="absolute inset-y-0 left-0 pl-4 flex items-center text-slate-400 group-focus-within:text-[#0040A1] transition-colors">
                            <i data-lucide="lock" class="w-5 h-5"></i>
                        </span>
                        
                        <input type="password" id="senha_confirmacao" oninput="checarSenhas()"
                            class="block w-full pl-12 pr-12 py-3.5 bg-white border-2 border-slate-100 rounded-2xl text-sm font-medium text-slate-800 focus:outline-none focus:ring-0 focus:border-[#0040A1] transition-colors placeholder:text-slate-300 placeholder:font-normal" 
                            placeholder="••••••••">
                            
                        <button type="button" onclick="togglePassword('senha_confirmacao', 'eyeIconConfirm')" class="absolute inset-y-0 right-0 pr-4 flex items-center text-slate-400 hover:text-[#0040A1] cursor-pointer focus:outline-none transition-colors">
                            <svg id="eyeIconConfirm" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/>
                                <circle cx="12" cy="12" r="3"/>
                            </svg>
                        </button>
                    </div>
                    <p id="senhaErro" class="text-red-500 text-xs font-bold mt-2 hidden text-left pl-1 transition-all">As senhas não coincidem</p>
                </div>
            </div>

            <button onclick="processarAcao()" id="btnCadastro" class="w-full py-3.5 sm:py-4 mt-6 bg-gradient-to-b from-[#060A1F] to-[#0040A1] text-white rounded-2xl font-bold text-[14px] sm:text-[15px] shadow-lg shadow-[#0040A1]/30 hover:to-[#003080] hover:from-[#040714] hover:-translate-y-0.5 active:scale-95 transition-all flex items-center justify-center gap-3 group">
                <span>Continuar para Pagamento</span>
                <i data-lucide="arrow-right" class="w-4 h-4 group-hover:translate-x-1 transition-transform"></i>
            </button>

        </div>
        
        <div id="area-login" class="mt-6 sm:mt-8 w-full text-center text-[12px] sm:text-[13px] text-slate-600">
            <span>Já tem uma conta?</span>
            <br>
            <a href="index.html" class="text-[#0040A1] font-bold mt-1 inline-block hover:underline transition-all">
                Fazer Login ➔
            </a>
        </div>

        <div class="mt-8 sm:mt-10 w-full text-center">
            <p class="text-[#64748b] text-[9px] sm:text-[10px] uppercase tracking-[0.2em] font-extrabold">
                © 2026 Lumis
            </p>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
      lucide.createIcons();

      // Configurações do Supabase
      const supabaseUrl = 'https://izmdjkalwgupuehrbcxm.supabase.co';
      const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml6bWRqa2Fsd2d1cHVlaHJiY3htIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzAyNDkwNTUsImV4cCI6MjA4NTgyNTA1NX0.w3FW5oORqiEjT0Xj3d3777KfE0xl2zm0ogezpfN3Gss';
      
      let supabaseClient;
      try {
          supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);
      } catch(e) {
          console.error("Supabase não inicializado. Verifique as chaves.");
      }
      
      // LINKS DE PRODUÇÃO DO STRIPE CORRETOS
      const LINK_MENSAL = "https://buy.stripe.com/8x29ATe0PbI8bT00h800000";
      const LINK_ANUAL = "https://buy.stripe.com/dRmcN52i79A08GOfc200001";

      let planoAtivo = 'anual';
      
      // Armazena o ID do usuário se ele já estiver logado
      let usuarioLogadoId = null;

      function selecionarPlano(plano) {
          planoAtivo = plano;
          
          const btnMensal = document.getElementById('btn-plano-mensal');
          const btnAnual = document.getElementById('btn-plano-anual');
          const textoPlano = document.getElementById('plano-selecionado-texto');

          const cssAtivo = "flex-1 relative p-3 sm:p-4 rounded-2xl border-2 transition-all cursor-pointer border-[#0040A1] bg-blue-50/50 ring-2 ring-[#0040A1]/20 scale-[1.02] shadow-md opacity-100";
          const cssInativo = "flex-1 relative p-3 sm:p-4 rounded-2xl border-2 transition-all cursor-pointer border-slate-100 bg-white opacity-60 hover:opacity-100 hover:border-slate-300 scale-100";

          if (plano === 'mensal') {
              btnMensal.className = cssAtivo;
              btnAnual.className = cssInativo;
              textoPlano.innerHTML = "Está prestes a assinar o <b>Plano Mensal</b>.";
          } else {
              btnAnual.className = cssAtivo;
              btnMensal.className = cssInativo;
              textoPlano.innerHTML = "Excelente escolha! <b>Plano Anual</b> com desconto.";
          }
      }

      function showToast(message, type = 'error') {
          const container = document.getElementById('toast-container');
          const toast = document.createElement('div');
          
          const bgColors = { error: 'bg-red-500', success: 'bg-emerald-500', warning: 'bg-amber-500' };
          const icons = { error: 'alert-circle', success: 'check-circle', warning: 'alert-triangle' };

          toast.className = `${bgColors[type]} text-white px-5 py-3.5 rounded-xl shadow-xl flex items-center gap-3 font-medium text-sm toast-enter w-max max-w-sm ml-auto`;
          toast.innerHTML = `<i data-lucide="${icons[type]}" class="w-5 h-5 flex-shrink-0"></i> <span>${message}</span>`;
          
          container.appendChild(toast);
          lucide.createIcons();

          requestAnimationFrame(() => {
              toast.classList.remove('toast-enter');
              toast.classList.add('toast-enter-active');
          });

          setTimeout(() => {
              toast.classList.remove('toast-enter-active');
              toast.classList.add('toast-leave-active');
              setTimeout(() => toast.remove(), 300);
          }, 4000);
      }

      function togglePassword(inputId, iconId) {
        const input = document.getElementById(inputId);
        const icon = document.getElementById(iconId);
        if (input.type === 'password') {
            input.type = 'text';
            icon.innerHTML = '<path d="M9.88 9.88a3 3 0 1 0 4.24 4.24"/><path d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68"/><path d="M6.61 6.61A13.526 13.526 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61"/><line x1="2" x2="22" y1="2" y2="22"/>';
        } else {
            input.type = 'password';
            icon.innerHTML = '<path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/>';
        }
      }

      function checarSenhas() {
          const senha = document.getElementById('senha').value;
          const senhaConf = document.getElementById('senha_confirmacao').value;
          const erroMsg = document.getElementById('senhaErro');
          if (senhaConf.length > 0 && senha !== senhaConf) erroMsg.classList.remove('hidden');
          else erroMsg.classList.add('hidden');
      }

      // Função Principal que decide se cria conta ou só redireciona
      async function processarAcao() {
        const btn = document.getElementById('btnCadastro');
        const originalContent = btn.innerHTML;
        btn.innerHTML = `<svg class="animate-spin h-5 w-5 text-white" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> <span>Processando...</span>`;
        btn.disabled = true;
        btn.classList.add('opacity-90', 'cursor-not-allowed');

        try {
            // CENA 1: Usuário já está logado (veio da tela de login para reativar a assinatura)
            if (usuarioLogadoId) {
                showToast("Redirecionando para o pagamento...", "success");
                const linkCorretoStripe = planoAtivo === 'anual' ? LINK_ANUAL : LINK_MENSAL;
                setTimeout(() => {
                    window.location.href = `${linkCorretoStripe}?client_reference_id=${usuarioLogadoId}`;
                }, 1500);
                return; // Para a execução aqui
            }

            // CENA 2: Usuário novo criando conta
            const email = document.getElementById('email').value.trim();
            const senha = document.getElementById('senha').value;
            const senhaConfirmacao = document.getElementById('senha_confirmacao').value;

            if (!email || !senha || !senhaConfirmacao) {
                showToast("Por favor, preencha todos os campos para continuar.", "warning");
                restaurarBotao();
                return;
            }

            if (senha !== senhaConfirmacao) {
                showToast("As senhas não coincidem. Verifique e tente novamente.", "error");
                restaurarBotao();
                return;
            }

            const { data, error } = await supabaseClient.auth.signUp({
                email: email,
                password: senha
            });

            if (error) {
                if (error.message.includes("already registered") || error.message.includes("already exists")) {
                    showToast("Esse e-mail já está cadastrado. Faça login para reativar!", "warning");
                    setTimeout(() => { window.location.href = "login.html"; }, 2500);
                } else {
                    showToast("Erro ao criar conta: " + error.message, "error");
                }
                restaurarBotao();
                return;
            }

            showToast("Sucesso! Redirecionando para o pagamento...", "success");
            
            if (data?.user?.id) {
                const linkCorretoStripe = planoAtivo === 'anual' ? LINK_ANUAL : LINK_MENSAL;
                setTimeout(() => {
                    window.location.href = `${linkCorretoStripe}?client_reference_id=${data.user.id}`;
                }, 1500);
            } else {
                showToast("Erro inesperado ao capturar o ID do usuário.", "error");
                restaurarBotao();
            }

        } catch (err) {
            console.error(err);
            showToast("Erro de ligação. Verifique a sua internet.", "error");
            restaurarBotao();
        }

        function restaurarBotao() {
            btn.innerHTML = originalContent;
            btn.disabled = false;
            btn.classList.remove('opacity-90', 'cursor-not-allowed');
            lucide.createIcons();
        }
      }

      // Ao carregar a página
      document.addEventListener("DOMContentLoaded", async () => {
          const urlParams = new URLSearchParams(window.location.search);
          const planoInicial = urlParams.get('plano') === 'mensal' ? 'mensal' : 'anual';
          selecionarPlano(planoInicial);

          // Verifica se o usuário já está logado
          const { data: { user } } = await supabaseClient.auth.getUser();
          
          if (user) {
              // Se tiver logado, salva o ID para usar no pagamento e esconde o formulário
              usuarioLogadoId = user.id;
              
              document.getElementById('titulo-pagina').innerText = "Reative sua assinatura";
              document.getElementById('formulario-cadastro').style.display = 'none';
              document.getElementById('area-login').style.display = 'none'; // Esconde o texto "Já tem uma conta?"
              
              // Mostra um aviso bonitinho
              const avisoHtml = document.createElement('div');
              avisoHtml.className = 'text-center p-4 bg-emerald-50 text-emerald-700 rounded-xl font-medium text-sm mb-6';
              avisoHtml.innerHTML = `Você já está logado como <b>${user.email}</b>.<br>Escolha o seu plano abaixo para continuar.`;
              document.getElementById('formulario-cadastro').parentNode.insertBefore(avisoHtml, document.getElementById('btnCadastro'));
          }
      });

      document.addEventListener('keypress', (e) => { 
          if (e.key === 'Enter') processarAcao(); 
      });
    </script>
</body>
</html>
