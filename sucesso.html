<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumis - Pagamento Aprovado</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400;1,700&display=swap" rel="stylesheet">
    
    <style>
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
        }
    </style>
</head>
<body class="bg-[#05121b] min-h-screen flex items-center justify-center p-4 relative overflow-hidden">
    
    <div class="absolute top-[-10%] left-[-10%] w-96 h-96 bg-blue-600/20 rounded-full blur-[100px] pointer-events-none"></div>
    <div class="absolute bottom-[-10%] right-[-10%] w-96 h-96 bg-emerald-600/10 rounded-full blur-[100px] pointer-events-none"></div>

    <div class="max-w-md w-full bg-white rounded-[2rem] p-8 md:p-10 text-center shadow-2xl relative z-10 border border-slate-100 animate-in fade-in zoom-in duration-500">
        
        <div class="w-20 h-20 bg-emerald-50 rounded-full flex items-center justify-center mx-auto mb-6 border-4 border-emerald-100 shadow-inner">
            <i data-lucide="check-circle-2" class="w-10 h-10 text-emerald-500"></i>
        </div>

        <h1 class="text-2xl md:text-3xl font-black text-[#05121b] tracking-tight mb-4 leading-tight">
            🎉 Pagamento Aprovado <br/> <span class="text-emerald-600">com Sucesso!</span>
        </h1>

        <p class="text-slate-500 text-sm md:text-base font-medium leading-relaxed px-2">
            Bem-vindo(a) ao grupo exclusivo de <strong class="text-blue-600">Fundadores do Lumis Financeiro</strong>. Sua conta já está liberada e pronta para uso!
        </p>

        <a href="login.html" class="mt-8 w-full bg-blue-600 hover:bg-blue-700 text-white font-black py-4 rounded-xl shadow-lg shadow-blue-600/30 hover:scale-[1.02] transition-all flex items-center justify-center gap-2 text-xs uppercase tracking-widest">
            Acessar Minha Conta <i data-lucide="arrow-right" class="w-4 h-4"></i>
        </a>

        <div class="mt-8 flex items-center justify-center gap-2 opacity-50">
            <img src="logo.png" alt="Lumis" class="h-5 object-contain" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';"/>
            <div class="hidden items-center gap-1">
                <span class="font-black italic tracking-tighter text-[#05121b] text-lg">Lumis</span>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
